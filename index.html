<!DOCTYPE html>
<html lang="zh-Hant">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>SIM 管理系統 V4.0 - 終極版</title>
   <style>
       /* 樣式設定：維持大字體與清晰排版 */
       body { font-family: system-ui, -apple-system, sans-serif; background-color: #f1f5f9; padding: 20px; color: #334155; margin: 0; }
       .container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
       
       /* 頂部數據卡片 */
       .dashboard { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
       .stat-card { background: #f8fafc; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; flex: 1; min-width: 120px; text-align: center; }
       .stat-card .label { font-size: 40px; color: #64748b; font-weight: bold; }
       .stat-card .value { font-size: 40px; font-weight: 900; color: #1e293b; }
       
       .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px; }
       h1 { margin: 0; font-size: 45px; }
       h1 span { color: #3b82f6; }
       
       /* 工具列 */
       .tool-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: #f8fafc; padding: 12px 15px; border-radius: 15px; flex-wrap: wrap; }
       .search-box { flex: 1; min-width: 250px; padding: 10px 15px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 20px; }
       
       /* 按鈕樣式 */
       .btn { padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
       .btn-refresh { background: #fff; border: 1px solid #e2e8f0; color: #475569; }
       .btn-sync { background: #10b981; color: white; font-size: 16px; }
       .btn-sync.dirty { background: #10b981 !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.6); animation: pulse 1.5s infinite; }
       
       @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
       
       /* 表格樣式 */
       table { width: 100%; border-collapse: collapse; table-layout: fixed; }
       th { background: #1e293b; color: #94a3b8; padding: 15px 10px; text-align: left; font-weight: bold; font-size: 26px; }
       td { padding: 15px 10px; border-bottom: 1px solid #f1f5f9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 20px; }
       tr.selected { background-color: #eff6ff !important; }
       
       /* 狀態標籤 */
       .badge { padding: 6px 10px; border-radius: 8px; font-size: 16px; font-weight: 900; }
       .badge-stock { background: #dcfce7; color: #166534; }
       .badge-used { background: #dbeafe; color: #1e40af; }
       .badge-lost { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

       .quick-edit-btn { display: inline-flex; align-items: center; justify-content: center; width: 25px; height: 25px; margin-left: 5px; background: #f1f5f9; border-radius: 5px; cursor: pointer; color: #94a3b8; border: 1px solid #e2e8f0; font-size: 12px; }
       .btn-edit { background: #334155; color: white; padding: 10px 18px; border-radius: 8px; cursor:pointer; border:none; font-size: 18px; }
       
       /* 彈窗與加載中 */
       #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(5px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
       .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 9000; backdrop-filter: blur(4px); }
       .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 480px; }
       input, select { width: 100%; padding: 15px; border: 2px solid #f1f5f9; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; font-weight: bold; font-size: 20px; }
       h2 { margin-top: 0; font-size: 28px; }
   </style>
</head>
<body>

   <div id="loader">⚙️ 正在處理雲端數據，請稍候...</div>

   <div class="container">
       <div class="dashboard">
           <div class="stat-card"><div class="label">總卡片</div><div id="statTotal" class="value">0</div></div>
           <div class="stat-card"><div class="label">在庫</div><div id="statInStock" class="value" style="color:#10b981">0</div></div>
           <div class="stat-card"><div class="label">已領用</div><div id="statUsed" class="value" style="color:#3b82f6">0</div></div>
           <div class="stat-card"><div class="label">遺失</div><div id="statLost" class="value" style="color:#ef4444">0</div></div>
       </div>

       <div class="header-box">
           <h1>SIM <span>管理系統 V4.0</span></h1>
           <div style="display: flex; gap: 12px;">
                <button onclick="showHistoryLog()" class="btn" style="background:#475569;color:white;">📜 操作紀錄</button>
                <button onclick="loadData()" class="btn btn-refresh">🫠 F5制🫠</button>
                <button onclick="uploadData()" id="syncBtn" class="btn btn-sync">🫵 💾 儲存並同步雲端 🫵</button>
           </div>
       </div>

       <div class="tool-bar">
           <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋 ID、人員、地點..." oninput="render()">
           <div id="batchTools" style="display:none; gap:10px;">
                <button onclick="openBatchClaim()" class="btn" style="background:#2563eb;color:white; font-size: 16px;">🎁 批量修改 (<span id="selectCount">0</span>)</button>
               <button onclick="batchReset()" class="btn" style="background:#fff1f2; color:#be123c; border:1px solid #fecaca;">🧹 批量歸還</button>
           </div>
       </div>

       <table>
           <thead>
               <tr>
                   <th style="width:50px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()" style="width:25px;height:25px;"></th>
                   <th style="width:80px;">編號</th><th style="width:110px;">狀態</th><th style="width:150px;">電訊商</th>
                   <th style="width:130px;">可用量</th><th style="width:160px;">到期日</th><th>地點</th>
                   <th style="width:130px;">領取人</th><th style="width:140px; text-align:center">更新時間</th><th style="width:100px; text-align:center">操作</th>
               </tr>
           </thead>
           <tbody id="simTable"></tbody>
       </table>
   </div>

   <div id="batchClaimModal" class="modal"><div class="modal-content"><h2>批量修改卡片</h2><p style="font-size:18px;">已選中 <b id="batchCountText" style="color:red;"></b> 張卡片</p><label>更改人員 / 狀態</label><select id="batchStaff"></select><label>更改地點</label><input type="text" id="batchLoc" placeholder="不變更請留空"><label>更改可用量 (GB)</label><input type="text" id="batchRemains" placeholder="不變更請留空"><div style="display:flex;gap:10px;"><button onclick="closeModal('batchClaimModal')" class="btn" style="flex:1;">取消</button><button onclick="confirmBatchClaim()" class="btn" style="background:#2563eb;color:white;flex:1;">確認變更</button></div></div></div>

   <div id="editModal" class="modal"><div class="modal-content"><h2 id="modalTitle">編輯</h2><label>可用量 (GB)</label><input type="text" id="inputUsageVal"><label>地點</label><input type="text" id="inputLoc"><label>人員 / 狀態選擇</label><select id="selectStaff"></select><div style="display:flex;gap:10px;"><button onclick="closeModal('editModal')" class="btn" style="flex:1;">取消</button><button onclick="confirmSave()" class="btn" style="background:#2563eb;color:white;flex:1;">儲存</button></div></div></div>
   
   <div id="telcoModal" class="modal"><div class="modal-content"><h2>選擇電訊商</h2><div id="telcoBtnGroup" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div><button onclick="closeModal('telcoModal')" class="btn" style="width:100%;margin-top:20px;">關閉</button></div></div>

   <script>
       // 請換成你部署後的 GAS URL
       const GAS_URL = "https://script.google.com/macros/s/AKfycbyOb20RzHn8aPxWfX00X-WKMHTyeXe3OTsFvhZNKGAdTTv0BtMNAruGisr07tAQ4XOH/exec"; 

       const userList = ["Leo", "Mason", "Mayce", "Sherman", "ting ting", "Jenna", "Roy", "Arron", "solar", "Willam", "hanson"];
       const telcoList = ["CSL", "3HK", "SmarTone", "CMHK", "Lucky SIM", "MORE", "鴨聊佳"];
       let simRecords = []; let selectedIndices = new Set(); let currentIdx = null;

       // 初始化：建立選單選項
       window.onload = function() {
           const s1 = document.getElementById('selectStaff');
           const s2 = document.getElementById('batchStaff');
           const opts = [
               new Option("-- 未領取 (在庫) --", "---"), 
               new Option("⚠️ 標記為遺失 ⚠️", "LOST"), 
               ...userList.map(n => new Option(n, n))
           ];
           opts.forEach(o => s1.add(o.cloneNode(true))); 
           s2.add(new Option("-- 不變更人員 --", "KEEP"));
           opts.forEach(o => s2.add(o.cloneNode(true)));
           s2.value = "KEEP";

           // 電訊商按鈕
           const btnGroup = document.getElementById('telcoBtnGroup');
           telcoList.forEach(t => {
                let btn = document.createElement('button'); btn.className = 'btn'; btn.style.border="1px solid #e2e8f0"; btn.innerText = t; btn.style.fontSize="18px";
                btn.onclick = () => { 
                    if(simRecords[currentIdx].telco !== t){ 
                        logAction(currentIdx, `變更電訊商: ${t}`); 
                        simRecords[currentIdx].telco = t; 
                        updateTime(currentIdx); setDirty(true); render(); 
                    } 
                    closeModal('telcoModal'); 
                };
                btnGroup.appendChild(btn);
           });
           loadData();
       };

       // 日期格式化：確保顯示 YYYY/MM/DD
       function formatDate(str) {
           if (!str || str === "---") return "---";
           const d = new Date(str);
           if (isNaN(d.getTime())) return str;
           return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
       }

       // 核心渲染功能
       function render() {
           const tbody = document.getElementById('simTable'); 
           const kw = document.getElementById('searchInput').value.toLowerCase();
           let counts = { total: simRecords.length, stock: 0, used: 0, lost: 0 };
           
           tbody.innerHTML = simRecords.map((r, i) => {
                // 搜尋過濾
                if (!(r.id.toString().toLowerCase().includes(kw) || r.staff.toLowerCase().includes(kw) || r.location.toLowerCase().includes(kw))) return "";
                
                const isLost = r.usage === "遺失";
                const isUsed = r.staff !== "---" && !isLost;
                if (isLost) counts.lost++; else if (isUsed) counts.used++; else counts.stock++;

                let badgeHTML = isLost ? `<span class="badge badge-lost">遺失</span>` : (isUsed ? `<span class="badge badge-used">已領用</span>` : `<span class="badge badge-stock">在庫</span>`);
                const isChecked = selectedIndices.has(i);

                return `<tr class="${isChecked ? 'selected' : ''}">
                    <td><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleRow(${i})" style="width:22px;height:22px;"></td>
                    <td style="font-weight:bold; color:#64748b;">${r.id}</td>
                    <td>${badgeHTML}</td>
                    <td><b>${r.telco}</b><div class="quick-edit-btn" onclick="currentIdx=${i}; document.getElementById('telcoModal').style.display='flex';">✏️</div></td>
                    <td>${r.remains}</td><td>${formatDate(r.expiry)}</td>
                    <td>${r.location}</td><td style="color:#2563eb; font-weight:900;">${r.staff}</td>
                    <td style="font-size:14px; color:#94a3b8; text-align:center;">${r.date}</td>
                    <td style="text-align:center;"><button onclick="openEditModal(${i})" class="btn-edit">修改</button></td>
                </tr>`;
           }).join('');

           document.getElementById('statTotal').innerText = counts.total;
           document.getElementById('statInStock').innerText = counts.stock;
           document.getElementById('statUsed').innerText = counts.used;
           document.getElementById('statLost').innerText = counts.lost;
           document.getElementById('batchTools').style.display = selectedIndices.size > 0 ? 'flex' : 'none';
           document.getElementById('selectCount').innerText = selectedIndices.size;
       }

       // 批量修改邏輯
       function openBatchClaim() {
           document.getElementById('batchCountText').innerText = selectedIndices.size;
           document.getElementById('batchStaff').value = "KEEP"; 
           document.getElementById('batchLoc').value = ""; 
           document.getElementById('batchRemains').value = "";
           document.getElementById('batchClaimModal').style.display = 'flex';
       }

       function confirmBatchClaim() {
           let r_v = document.getElementById('batchRemains').value.trim();
           if(r_v && !isNaN(r_v)) r_v += " GB";
           const l_v = document.getElementById('batchLoc').value.trim();
           const s_v = document.getElementById('batchStaff').value;

           selectedIndices.forEach(idx => {
               const r = simRecords[idx];
               if(r_v) r.remains = r_v; 
               if(l_v) r.location = l_v;
               if(s_v !== "KEEP") {
                   if(s_v === "LOST") { r.usage = "遺失"; r.staff = "---"; r.location = "---"; }
                   else { r.usage = (s_v === "---") ? "在庫" : "已領用"; r.staff = s_v; }
               }
               logAction(idx, "批量修改內容"); 
               updateTime(idx);
           });

           setDirty(true); closeModal('batchClaimModal'); selectedIndices.clear(); 
           document.getElementById('selectAll').checked = false; render();
       }

          function confirmBatchClaim() {
           let r_v = document.getElementById('batchRemains').value.trim();
           if(r_v && !isNaN(r_v)) r_v += " GB";
           const l_v = document.getElementById('batchLoc').value.trim();
           const s_v = document.getElementById('batchStaff').value;
           
           selectedIndices.forEach(idx => {
               let changes = [];
               if(r_v && simRecords[idx].remains !== r_v) { changes.push(`用量:${simRecords[idx].remains}→${r_v}`); simRecords[idx].remains = r_v; }
               if(l_v && simRecords[idx].location !== l_v) { changes.push(`地點:${simRecords[idx].location}→${l_v}`); simRecords[idx].location = l_v; }
               if(s_v !== "" && simRecords[idx].staff !== s_v) { changes.push(`人員:${simRecords[idx].staff}→${s_v}`); simRecords[idx].staff = s_v; simRecords[idx].usage = (s_v==="---"?"在庫":"已領用"); }
               
               if(changes.length > 0) {
                   logAction(idx, "批量修改", changes.join(", "));
                   updateTime(idx);
               }
           });
           setDirty(true); closeModal('batchClaimModal'); render();
       }


      
       // 單個編輯邏輯
       function openEditModal(idx) {
           currentIdx = idx; const r = simRecords[idx];
           document.getElementById('modalTitle').innerText = "編輯卡號：" + r.id;
           document.getElementById('inputUsageVal').value = r.remains.replace(" GB","")==="---"?"":r.remains.replace(" GB","");
           document.getElementById('inputLoc').value = r.location==="---"?"":r.location;
           document.getElementById('selectStaff').value = (r.usage === "遺失") ? "LOST" : r.staff;
           document.getElementById('editModal').style.display='flex';
       }

       function confirmSave() {
           const r = simRecords[currentIdx];
           let newV = document.getElementById('inputUsageVal').value.trim();
           if(newV && !isNaN(newV)) newV += " GB"; else if(!newV) newV = "---";
           const newL = document.getElementById('inputLoc').value.trim() || "---";
           const newS = document.getElementById('selectStaff').value;

           if (newS === "LOST") { r.usage = "遺失"; r.staff = "---"; r.location = "---"; }
           else { r.usage = (newS === "---") ? "在庫" : "已領用"; r.staff = newS; r.location = newL; }
           
           r.remains = newV;
           logAction(currentIdx, "手動修改資料");
           updateTime(currentIdx); setDirty(true); render(); closeModal('editModal');
       }

       // 網絡請求：讀取
       async function loadData() {
           toggleLoader(true);
           try {
                const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
                simRecords = await res.json(); 
                render();
           } catch(e) { alert("讀取雲端失敗，請檢查網絡或 GAS 網址。"); }
           toggleLoader(false);
       }

       // 網絡請求：上傳儲存
       async function uploadData() {
           toggleLoader(true);
           try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(simRecords) });
                setDirty(false); 
                setTimeout(() => { alert("✅ 資料已成功儲存並同步到 Google Sheet"); loadData(); }, 1200);
           } catch(e) { alert("同步失敗，請重試。"); }
           toggleLoader(false);
       }

       // 網絡請求：顯示操作紀錄 (Alert 版)
       async function showHistoryLog() {
           toggleLoader(true);
           try {
                const res = await fetch(GAS_URL + "?type=getLogs&t=" + new Date().getTime());
                const logs = await res.json();
                if (logs.length === 0) {
                    alert("目前暫無任何操作紀錄。");
                } else {
                    const msg = logs.slice(0, 10).map(l => `${l.time} | ID: ${l.id} | ${l.action}`).join("\n");
                    alert("最近 10 條操作紀錄：\n\n" + msg);
                }
           } catch(e) { alert("無法讀取紀錄，請確保 GAS 已正確部署。"); }
           toggleLoader(false);
       }

       // 輔助功能
       function logAction(idx, msg) { simRecords[idx].action = msg; }
       function updateTime(idx) { 
           simRecords[idx].date = new Date().toLocaleString('zh-HK', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }); 
       }
       function setDirty(d) { document.getElementById('syncBtn').classList.toggle('dirty', d); }
       function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
       function closeModal(id) { document.getElementById(id).style.display = 'none'; }
       function toggleRow(i) { selectedIndices.has(i) ? selectedIndices.delete(i) : selectedIndices.add(i); render(); }
       function toggleSelectAll() { 
           const chk = document.getElementById('selectAll').checked; 
           selectedIndices.clear(); 
           if(chk) simRecords.forEach((_,i)=>selectedIndices.add(i)); 
           render(); 
       }
   </script>
</body>
</html>
