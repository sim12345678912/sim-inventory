<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIM管理系統</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f1f5f9;
      padding: 20px;
      color: #334155;
      margin: 0;
    }

    .container {
      max-width: 1450px;
      margin: 0 auto;
      background: white;
      padding: 22px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .dashboard {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #f8fafc;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      flex: 1;
      min-width: 140px;
      text-align: center;
    }

    .stat-card .label {
      font-size: 18px;
      color: #64748b;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 900;
      color: #1e293b;
      line-height: 1.1;
    }

    .header-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 900;
      color: #0f172a;
    }

    .tool-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      background: #f8fafc;
      padding: 12px 14px;
      border-radius: 14px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 240px;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
      font-weight: 600;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      border: none;
      transition: 0.3s;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-refresh { background: #fff; border: 1px solid #e2e8f0; color: #475569; }
    .btn-sync { background: #f59e0b; color: white; }
    .btn-sync.dirty {
      background: #10b981 !important;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.6);
      animation: pulse 1.5s infinite;
    }
    .btn-excel { background: #059669; color: white; }
    .btn-log { background: #6366f1; color: white; }
    .btn-history { background: #475569; color: white; }
    .btn-lost { background: #dc2626; color: white; }
    .btn-unlost { background: #f59e0b; color: white; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .expiring-soon {
      color: #ef4444 !important;
      font-weight: 900 !important;
      animation: blink 1s infinite;
    }

    .expired-date {
      color: #dc2626 !important;
      font-weight: 900 !important;
      background: #fee2e2;
      padding: 2px 6px;
      border-radius: 6px;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      min-width: 1180px;
    }

    th {
      background: #1e293b;
      color: #cbd5e1;
      padding: 12px 8px;
      text-align: left;
      font-size: 16px;
      white-space: nowrap;
    }

    td {
      padding: 12px 8px;
      border-bottom: 1px solid #f1f5f9;
      white-space: nowrap;
      font-size: 16px;
      vertical-align: middle;
    }

    tr.selected { background-color: #eff6ff !important; }
    tr.row-lost { background: #fef2f2 !important; }
    tr.row-overdue { background: #fecaca !important; }

    .checkbox-cell {
      width: 48px;
      text-align: center;
    }

    input[type="checkbox"] {
      transform: scale(1.3);
      cursor: pointer;
    }

    .badge {
      padding: 5px 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 900;
      display: inline-block;
    }

    .badge-stock { background: #dcfce7; color: #166534; }
    .badge-used { background: #dbeafe; color: #1e40af; }
    .badge-lost { background: #fee2e2; color: #b91c1c; }

    .quick-edit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      margin-left: 4px;
      background: #f1f5f9;
      border-radius: 6px;
      cursor: pointer;
      color: #64748b;
      border: 1px solid #e2e8f0;
      font-size: 11px;
      vertical-align: middle;
    }

    .btn-edit {
      background: #334155;
      color: white;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-size: 15px;
      font-weight: 800;
    }

    .btn-reset-single {
      color: #94a3b8;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      border: none;
      background: none;
      cursor: pointer;
      padding: 0 4px;
      vertical-align: middle;
    }

    #loader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(5px);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 22px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 9000;
      backdrop-filter: blur(4px);
      padding: 20px;
      box-sizing: border-box;
    }

    .modal-content {
      background: white;
      padding: 24px;
      border-radius: 18px;
      width: 95%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-content h2 {
      margin-top: 0;
      font-size: 24px;
      margin-bottom: 16px;
    }

    .modal-content p,
    .modal-content label {
      font-size: 16px;
      font-weight: 700;
    }

    .history-table-container {
      max-height: 420px;
      overflow-y: auto;
      margin-top: 15px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #f1f5f9;
      border-radius: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
      font-weight: bold;
      font-size: 16px;
    }

    .telco-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .telco-btn {
      padding: 14px;
      border: 2px solid #f1f5f9;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
      font-size: 16px;
    }

    .batch-btn-group {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
    }

    .admin-footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px dashed #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bottom-tools {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .container { padding: 14px; }
      h1 { font-size: 24px; }
      .stat-card .label { font-size: 15px; }
      .stat-card .value { font-size: 22px; }
      .btn { font-size: 14px; padding: 9px 12px; }
      .search-box { font-size: 14px; }
      th { font-size: 14px; }
      td { font-size: 14px; }
      .badge { font-size: 12px; }
      .btn-edit { font-size: 14px; }
      .modal-content h2 { font-size: 20px; }
      .modal-content p, .modal-content label { font-size: 14px; }
      input, select { font-size: 14px; }
      .telco-btn { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div id="loader">⚙️ 正在讀取雲端數據...</div>

  <div class="container">
    <div class="dashboard">
      <div class="stat-card"><div class="label">總卡片</div><div id="statTotal" class="value">0</div></div>
      <div class="stat-card"><div class="label">在庫</div><div id="statInStock" class="value" style="color:#10b981">0</div></div>
      <div class="stat-card"><div class="label">已領用</div><div id="statUsed" class="value" style="color:#3b82f6">0</div></div>
      <div class="stat-card"><div class="label">遺失</div><div id="statLost" class="value" style="color:#dc2626">0</div></div>
    </div>

    <div class="header-box">
      <h1>SIM管理系統</h1>
      <div style="display: flex; gap: 10px; flex-wrap:wrap;">
        <button onclick="showHistoryLog()" class="btn btn-history">📜 操作紀錄</button>
        <button onclick="loadData()" class="btn btn-refresh">🔄 刷新</button>
        <button onclick="uploadData()" id="syncBtn" class="btn btn-sync">💾 儲存並同步</button>
      </div>
    </div>

    <div class="tool-bar">
      <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋 ID、人員、地點、電訊商或狀態..." oninput="render()">
      <div id="batchTools" class="batch-btn-group">
        <button onclick="openBatchClaim()" class="btn" style="background:#2563eb;color:white;">🎁 批量修改 (<span id="selectCount">0</span>)</button>
        <button onclick="batchReset()" class="btn" style="background:#fff1f2; color:#be123c; border:1px solid #fecaca;">🧹 批量歸還</button>
        <button onclick="batchMarkLost()" class="btn btn-lost">🚨 批量標記遺失</button>
        <button onclick="batchUnmarkLost()" class="btn btn-unlost">↩️ 取消遺失</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="checkbox-cell"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
            <th style="width:70px;">編號</th>
            <th style="width:90px;">狀態</th>
            <th style="width:130px;">電訊商</th>
            <th style="width:100px;">可用量</th>
            <th style="width:130px;">到期日</th>
            <th style="width:100px;">地點</th>
            <th style="width:110px;">領取人</th>
            <th style="width:140px; text-align:center;">更新時間</th>
            <th style="width:110px; text-align:center;">操作</th>
          </tr>
        </thead>
        <tbody id="simTable"></tbody>
      </table>
    </div>

    <div class="admin-footer">
      <button onclick="resetAllRecords()" class="btn" style="background:#fee2e2; color:#b91c1c; border:1px solid #fecaca;">⚠️ 重設全表狀態</button>
    </div>

    <div class="bottom-tools">
      <button onclick="openHistory()" class="btn btn-log">📊 原始表格</button>
      <button onclick="exportToExcel()" class="btn btn-excel">📥 匯出 Excel</button>
    </div>
  </div>

  <div id="historyLogModal" class="modal">
    <div class="modal-content" style="max-width: 900px; width: 95%;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>系統操作紀錄 (最近 1000 則)</h2>
      </div>
      <div class="history-table-container">
        <table style="table-layout: auto; min-width: 100%;">
          <thead style="position: sticky; top: 0; z-index: 10;">
            <tr>
              <th style="width:180px;">操作時間</th>
              <th>動作詳細內容</th>
            </tr>
          </thead>
          <tbody id="historyLogTable"></tbody>
        </table>
      </div>
      <button onclick="closeModal('historyLogModal')" class="btn" style="width:100%; margin-top:20px; background:#f1f5f9;">關閉</button>
    </div>
  </div>

  <div id="batchClaimModal" class="modal">
    <div class="modal-content">
      <h2>批量領取 / 修改</h2>
      <p>選中 <span id="batchCountText"></span> 張卡片</p>
      <label>領取人員</label>
      <select id="batchStaff"></select>
      <label>使用地點</label>
      <input type="text" id="batchLoc">
      <label>可用量</label>
      <input type="text" id="batchRemains">
      <div class="modal-actions">
        <button onclick="closeModal('batchClaimModal')" class="btn">取消</button>
        <button onclick="confirmBatchClaim()" class="btn" style="background:#2563eb;color:white;">確認變更</button>
      </div>
    </div>
  </div>

  <div id="telcoModal" class="modal">
    <div class="modal-content">
      <h2>選擇電訊商</h2>
      <div class="telco-grid" id="telcoBtnGroup"></div>
      <button onclick="closeModal('telcoModal')" class="btn" style="width:100%;margin-top:20px;">關閉</button>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">編輯</h2>
      <label>可用量 (GB)</label>
      <input type="text" id="inputUsageVal">
      <label>地點</label>
      <input type="text" id="inputLoc">
      <label>人員</label>
      <select id="selectStaff"></select>

      <div class="modal-actions">
        <button onclick="markCurrentLost()" class="btn btn-lost">🚨 標記遺失</button>
        <button onclick="unmarkCurrentLost()" class="btn btn-unlost">↩️ 取消遺失</button>
      </div>

      <div class="modal-actions" style="margin-top:15px;">
        <button onclick="closeModal('editModal')" class="btn">取消</button>
        <button onclick="confirmSave()" class="btn" style="background:#2563eb;color:white;">儲存</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzxDKUjBcUcTAB7S3Gbg2S4fL8poFJQWvKAZ2r3bwDFd7T53HoMBR9jfVIHwRGU45le/exec";
    const userList = ["Leo", "Mason", "Mayce", "Sherman", "ting ting", "Jenna", "Roy", "Arron", "solar", "Willam", "hanson"];
    const telcoList = ["CSL", "3HK", "SmarTone", "CMHK", "Lucky SIM", "MORE", "鴨聊佳", "VALUE", "其他"];

    let simRecords = [];
    let selectedIndices = new Set();
    let currentIdx = null;
    let isDirty = false;
    let historyLogs = JSON.parse(localStorage.getItem('sim_history_logs')) || [];

    function formatDate(str) {
      if (!str || str === "---") return "---";

      const s = String(str).trim();

      if (s.includes("T")) {
        return s.split("T")[0];
      }

      const d = new Date(s.replace(/-/g, "/"));
      if (isNaN(d)) return s;

      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function formatUpdateTime(str) {
      if (!str || str === "---") return "---";

      const s = String(str).trim();

      if (s.includes("T")) {
        const d = new Date(s);
        if (isNaN(d)) return s;
        return `${d.getMonth() + 1}月${d.getDate()}日 ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
      }

      const d = new Date(s.replace(/-/g, "/"));
      if (isNaN(d)) return s;

      return `${d.getMonth() + 1}月${d.getDate()}日 ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function normalizeUsage(record) {
      const usage = String(record.usage || "").trim();
      if (usage === "遺失") return "遺失";
      return (record.staff && record.staff !== "---") ? "已領用" : "在庫";
    }

    function getAutoStatus(record) {
      if (record.usage === "遺失") return "遺失";
      return (record.staff && record.staff !== "---") ? "已領用" : "在庫";
    }

    function getBadgeClass(status) {
      if (status === "遺失") return "badge-lost";
      if (status === "已領用") return "badge-used";
      return "badge-stock";
    }

    function toggleLoader(s) {
      document.getElementById('loader').style.display = s ? 'flex' : 'none';
    }

    function closeModal(id) {
      document.getElementById(id).style.display = 'none';
    }

    function setDirty(d) {
      isDirty = d;
      document.getElementById('syncBtn').classList.toggle('dirty', d);
    }

    function updateTime(idx) {
      const now = new Date();
      simRecords[idx].date =
        now.getFullYear() + "/" +
        String(now.getMonth() + 1).padStart(2, '0') + "/" +
        String(now.getDate()).padStart(2, '0') + " " +
        String(now.getHours()).padStart(2, '0') + ":" +
        String(now.getMinutes()).padStart(2, '0');
    }

    function isOverdue7Days(dateStr, record) {
      if (!dateStr || dateStr === "---") return false;
      if (getAutoStatus(record) !== "已領用") return false;

      const parsed = new Date(String(dateStr).replace(/-/g, "/"));
      if (isNaN(parsed)) return false;

      const now = new Date();
      const diffMs = now - parsed;
      const diffDays = diffMs / (1000 * 60 * 60 * 24);

      return diffDays >= 7;
    }

    function isExpiringSoon(d) {
      if (!d || d === "---") return false;

      const s = formatDate(d);
      if (s === "---") return false;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const expDate = new Date(s.replace(/-/g, "/"));
      if (isNaN(expDate)) return false;

      const diff = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
      return diff >= 0 && diff <= 7;
    }

    function isExpired(d) {
      if (!d || d === "---") return false;

      const s = formatDate(d);
      if (s === "---") return false;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const expDate = new Date(s.replace(/-/g, "/"));
      if (isNaN(expDate)) return false;

      expDate.setHours(0, 0, 0, 0);
      return expDate < today;
    }

    function logAction(idx, msg, customDiff = "") {
      const now = new Date();
      const timeStr =
        now.getFullYear() + "/" +
        String(now.getMonth() + 1).padStart(2, '0') + "/" +
        String(now.getDate()).padStart(2, '0') + " " +
        String(now.getHours()).padStart(2, '0') + ":" +
        String(now.getMinutes()).padStart(2, '0') + ":" +
        String(now.getSeconds()).padStart(2, '0');

      const recordId = simRecords[idx]?.id ?? "?";
      let fullMsg = `[卡號 ${recordId}] ${msg}`;
      if (customDiff) fullMsg += ` (${customDiff})`;

      if (simRecords[idx]) {
        simRecords[idx].action = `[${timeStr}] ${msg}`;
      }

      const logEntry = { time: timeStr, action: fullMsg };
      historyLogs.unshift(logEntry);
      if (historyLogs.length > 1000) historyLogs.pop();
      localStorage.setItem('sim_history_logs', JSON.stringify(historyLogs));
    }

    window.onload = function() {
      const s1 = document.getElementById('selectStaff');
      const s2 = document.getElementById('batchStaff');

      const baseOptions = [new Option("-- 未領取 --", "---"), ...userList.map(n => new Option(n, n))];
      baseOptions.forEach(o => s1.add(o.cloneNode(true)));

      s2.add(new Option("-- 不變更人員 --", ""));
      baseOptions.forEach(o => s2.add(o.cloneNode(true)));

      const btnGroup = document.getElementById('telcoBtnGroup');
      telcoList.forEach(t => {
        const btn = document.createElement('div');
        btn.className = 'telco-btn';
        btn.innerText = t;
        btn.onclick = () => {
          let newTelco = t;

          if (t === "其他") {
            const customTelco = prompt("請輸入其他電訊商名稱", "");
            if (customTelco === null) return;
            if (!customTelco.trim()) return;
            newTelco = customTelco.trim();
          }

          const oldT = simRecords[currentIdx].telco;
          if (oldT !== newTelco) {
            simRecords[currentIdx].telco = newTelco;
            logAction(currentIdx, `電訊商: ${oldT} → ${newTelco}`);
            updateTime(currentIdx);
            setDirty(true);
            render();
          }
          closeModal('telcoModal');
        };
        btnGroup.appendChild(btn);
      });

      loadData();
    };

    async function loadData() {
      toggleLoader(true);
      try {
        const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
        const data = await res.json();
        simRecords = data.map(r => ({
          ...r,
          telco: String(r.telco ?? "---"),
          location: String(r.location ?? "---"),
          staff: String(r.staff ?? "---"),
          remains: String(r.remains ?? "---"),
          usage: normalizeUsage(r),
          expiry: formatDate(r.expiry),
          action: r.action || "---",
          date: r.date || "---"
        }));
      } catch(e) {
        console.error(e);
        alert("讀取失敗");
      }
      selectedIndices.clear();
      document.getElementById('selectAll').checked = false;
      render();
      toggleLoader(false);
    }

    async function uploadData() {
      toggleLoader(true);
      try {
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(simRecords)
        });
        setDirty(false);
        alert("✅ 數據同步成功");
      } catch(e) {
        console.error(e);
        alert("同步失敗");
      }
      toggleLoader(false);
    }

    function render() {
      const tbody = document.getElementById('simTable');
      const kw = document.getElementById('searchInput').value.toLowerCase();
      let counts = { total: simRecords.length, stock: 0, used: 0, lost: 0 };

      tbody.innerHTML = simRecords.map((r, i) => {
        const status = getAutoStatus(r);

        const idText = String(r.id || "").toLowerCase();
        const staffText = String(r.staff || "").toLowerCase();
        const telcoText = String(r.telco || "").toLowerCase();
        const locationText = String(r.location || "").toLowerCase();
        const usageText = status.toLowerCase();

        if (!(idText.includes(kw) || staffText.includes(kw) || telcoText.includes(kw) || locationText.includes(kw) || usageText.includes(kw))) return "";

        if (status === "遺失") counts.lost++;
        else if (status === "已領用") counts.used++;
        else counts.stock++;

        const isChecked = selectedIndices.has(i);
        const overdueClass = isOverdue7Days(r.date, r) ? 'row-overdue' : '';
        const expiryClass = isExpired(r.expiry) ? 'expired-date' : (isExpiringSoon(r.expiry) ? 'expiring-soon' : '');

        return `
          <tr class="${isChecked ? 'selected' : ''} ${status === '遺失' ? 'row-lost' : ''} ${overdueClass}">
            <td class="checkbox-cell"><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleRow(${i})"></td>
            <td style="font-weight:bold; color:#94a3b8;">${r.id}</td>
            <td><span class="badge ${getBadgeClass(status)}">${status}</span></td>
            <td><b>${r.telco}</b><div class="quick-edit-btn" onclick="currentIdx=${i}; document.getElementById('telcoModal').style.display='flex';">✏️</div></td>
            <td>${r.remains}</td>
            <td class="${expiryClass}">${formatDate(r.expiry)}<div class="quick-edit-btn" onclick="quickEditExpiry(${i})">✏️</div></td>
            <td>${r.location}</td>
            <td style="color:#2563eb; font-weight:900;">${r.staff}</td>
            <td style="font-size:13px; color:#94a3b8; text-align:center;">${formatUpdateTime(r.date)}</td>
            <td style="text-align:center;">
              <button onclick="openEditModal(${i})" class="btn-edit">改</button>
              <button onclick="resetSingle(${i})" class="btn-reset-single">✕</button>
            </td>
          </tr>
        `;
      }).join('');

      document.getElementById('batchTools').style.display = selectedIndices.size > 0 ? 'flex' : 'none';
      document.getElementById('selectCount').innerText = selectedIndices.size;
      document.getElementById('statTotal').innerText = counts.total;
      document.getElementById('statInStock').innerText = counts.stock;
      document.getElementById('statUsed').innerText = counts.used;
      document.getElementById('statLost').innerText = counts.lost;
    }

    function toggleRow(i) {
      if (selectedIndices.has(i)) selectedIndices.delete(i);
      else selectedIndices.add(i);
      render();
    }

    function toggleSelectAll() {
      const chk = document.getElementById('selectAll').checked;
      selectedIndices.clear();
      if (chk) simRecords.forEach((_, i) => selectedIndices.add(i));
      render();
    }

    function openEditModal(idx) {
      currentIdx = idx;
      const r = simRecords[idx];
      document.getElementById('modalTitle').innerText = "編輯 " + r.id;
      document.getElementById('inputUsageVal').value =
        String(r.remains).replace("GB", "").replace(" GB", "").trim() === "---"
          ? ""
          : String(r.remains).replace("GB", "").replace(" GB", "").trim();
      document.getElementById('inputLoc').value = r.location === "---" ? "" : r.location;
      document.getElementById('selectStaff').value = r.staff || "---";
      document.getElementById('editModal').style.display = 'flex';
    }

    function confirmSave() {
      const r = simRecords[currentIdx];

      let newV = document.getElementById('inputUsageVal').value.trim();
      if (newV && !isNaN(newV)) newV += "GB";
      if (!newV) newV = "---";

      const newL = document.getElementById('inputLoc').value.trim() || "---";
      const newS = document.getElementById('selectStaff').value;

      let changes = [];
      if (r.remains !== newV) changes.push(`用量:${r.remains}→${newV}`);
      if (r.location !== newL) changes.push(`地點:${r.location}→${newL}`);
      if (r.staff !== newS) changes.push(`人員:${r.staff}→${newS}`);

      if (changes.length > 0) {
        r.remains = newV;
        r.location = newL;
        r.staff = newS;

        if (r.usage !== "遺失") {
          r.usage = (newS !== "---") ? "已領用" : "在庫";
        }

        logAction(currentIdx, "手動編輯", changes.join(", "));
        updateTime(currentIdx);
        setDirty(true);
        render();
      }

      closeModal('editModal');
    }

    function markCurrentLost() {
      const r = simRecords[currentIdx];
      if (!confirm(`確定將卡號 ${r.id} 標記為遺失？`)) return;

      if (r.usage !== "遺失") {
        const before = getAutoStatus(r);
        r.usage = "遺失";
        logAction(currentIdx, "標記遺失", `狀態:${before}→遺失`);
        updateTime(currentIdx);
        setDirty(true);
        render();
      }
      closeModal('editModal');
    }

    function unmarkCurrentLost() {
      const r = simRecords[currentIdx];
      if (r.usage !== "遺失") {
        alert("此卡目前不是遺失狀態");
        return;
      }

      if (!confirm(`確定取消卡號 ${r.id} 的遺失標記？`)) return;

      r.usage = (r.staff && r.staff !== "---") ? "已領用" : "在庫";
      logAction(currentIdx, "取消遺失", `新狀態:${r.usage}`);
      updateTime(currentIdx);
      setDirty(true);
      render();
      closeModal('editModal');
    }

    function openBatchClaim() {
      document.getElementById('batchCountText').innerText = selectedIndices.size;
      document.getElementById('batchClaimModal').style.display = 'flex';
    }

    function confirmBatchClaim() {
      let r_v = document.getElementById('batchRemains').value.trim();
      if (r_v && !isNaN(r_v)) r_v += " GB";
      const l_v = document.getElementById('batchLoc').value.trim();
      const s_v = document.getElementById('batchStaff').value;

      selectedIndices.forEach(idx => {
        const record = simRecords[idx];
        let changes = [];

        if (r_v && record.remains !== r_v) {
          changes.push(`用量:${record.remains}→${r_v}`);
          record.remains = r_v;
        }

        if (l_v && record.location !== l_v) {
          changes.push(`地點:${record.location}→${l_v}`);
          record.location = l_v;
        }

        if (s_v !== "" && record.staff !== s_v) {
          changes.push(`人員:${record.staff}→${s_v}`);
          record.staff = s_v;
        }

        if (record.usage !== "遺失" && s_v !== "") {
          record.usage = (record.staff === "---") ? "在庫" : "已領用";
        }

        if (changes.length > 0) {
          logAction(idx, "批量修改", changes.join(", "));
          updateTime(idx);
        }
      });

      setDirty(true);
      closeModal('batchClaimModal');
      render();
    }

    function resetSingle(idx) {
      if (!confirm("確定歸還此卡片？")) return;

      const record = simRecords[idx];
      const oldStatus = getAutoStatus(record);

      logAction(idx, "手動歸還", `原狀態:${oldStatus}, 原人員:${record.staff}`);
      record.staff = "---";
      record.location = "---";
      record.usage = "在庫";
      updateTime(idx);
      setDirty(true);
      render();
    }

    function batchReset() {
      if (!confirm("確定歸還選中的卡片？")) return;

      selectedIndices.forEach(idx => {
        const record = simRecords[idx];
        const oldStatus = getAutoStatus(record);

        if (oldStatus !== "在庫" || record.staff !== "---" || record.location !== "---") {
          logAction(idx, "批量歸還", `原狀態:${oldStatus}, 原人員:${record.staff}`);
          record.staff = "---";
          record.location = "---";
          record.usage = "在庫";
          updateTime(idx);
        }
      });

      selectedIndices.clear();
      document.getElementById('selectAll').checked = false;
      setDirty(true);
      render();
    }

    function batchMarkLost() {
      if (selectedIndices.size === 0) return;
      if (!confirm("確定將選中的卡片標記為遺失？")) return;

      selectedIndices.forEach(idx => {
        const record = simRecords[idx];
        const oldStatus = getAutoStatus(record);
        if (record.usage !== "遺失") {
          record.usage = "遺失";
          logAction(idx, "批量標記遺失", `狀態:${oldStatus}→遺失`);
          updateTime(idx);
        }
      });

      setDirty(true);
      render();
    }

    function batchUnmarkLost() {
      if (selectedIndices.size === 0) return;
      if (!confirm("確定取消選中卡片的遺失狀態？")) return;

      selectedIndices.forEach(idx => {
        const record = simRecords[idx];
        if (record.usage === "遺失") {
          record.usage = (record.staff && record.staff !== "---") ? "已領用" : "在庫";
          logAction(idx, "批量取消遺失", `新狀態:${record.usage}`);
          updateTime(idx);
        }
      });

      setDirty(true);
      render();
    }

    function resetAllRecords() {
      if (!confirm("⚠️ 警告：這將清空全表所有領取狀態！")) return;

      simRecords.forEach((record, i) => {
        const oldStatus = getAutoStatus(record);
        if (oldStatus !== "在庫" || record.staff !== "---" || record.location !== "---") {
          logAction(i, "全表重置歸還", `原狀態:${oldStatus}, 原人員:${record.staff}`);
          record.staff = "---";
          record.location = "---";
          record.usage = "在庫";
          updateTime(i);
        }
      });

      setDirty(true);
      render();
    }

    function quickEditExpiry(idx) {
      const oldE = simRecords[idx].expiry;
      const v = prompt("到期日 (YYYY-MM-DD):", oldE === "---" ? "" : oldE);
      if (v !== null) {
        const newE = formatDate(v.trim()) || "---";
        if (oldE !== newE) {
          simRecords[idx].expiry = newE;
          logAction(idx, "修改到期日", `${oldE} → ${newE}`);
          updateTime(idx);
          setDirty(true);
          render();
        }
      }
    }

    function showHistoryLog() {
      const tbody = document.getElementById('historyLogTable');
      if (historyLogs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding:20px; color:#94a3b8;">暫無操作紀錄</td></tr>';
      } else {
        tbody.innerHTML = historyLogs.map(log => `
          <tr>
            <td style="color:#64748b; font-family: monospace; font-size:13px; vertical-align:top;">${log.time}</td>
            <td style="white-space: normal; word-break: break-all; font-weight:500; color:#1e293b; line-height:1.5; font-size:15px;">${log.action}</td>
          </tr>
        `).join('');
      }
      document.getElementById('historyLogModal').style.display = 'flex';
    }

    function openHistory() {
      window.open("https://docs.google.com/spreadsheets/d/1QsQ19xSbsMXjcSa7hzItjOiQnwEoVtwpP3oPfcAp3MM/edit#gid=0");
    }

    function exportToExcel() {
      let csv = "\uFEFF編號,狀態,電訊商,可用量,到期日,地點,人員,更新時間\n";
      simRecords.forEach(r => {
        const status = getAutoStatus(r);
        csv += `${r.id},${status},${r.telco},${r.remains},${formatDate(r.expiry)},${r.location},${r.staff},${formatUpdateTime(r.date)}\n`;
      });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
      link.download = `SIM_Inventory.csv`;
      link.click();
    }
  </script>
</body>
</html>
