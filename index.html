<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>SIM Cloud - 管理系統</title>
    <style>
        body { font-family: sans-serif; background-color: #f1f5f9; padding: 20px; color: #334155; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; flex: 1; text-align: center; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; font-size: 14px; }
        .btn-sync { background: #f59e0b; color: white; }
        .btn-log { background: #6366f1; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; color: #94a3b8; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 400px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="container">
        <div class="dashboard">
            <div class="stat-card"><div>總卡片</div><div style="font-size:24px; font-weight:bold;">30</div></div>
            <div class="stat-card"><div>在庫</div><div style="font-size:24px; font-weight:bold; color:#10b981">26</div></div>
            <div class="stat-card"><div>已領用</div><div style="font-size:24px; font-weight:bold; color:#3b82f6">4</div></div>
        </div>

        <div class="header-box">
            <h1>SIM <span style="color:#3b82f6">Cloud</span></h1>
            <div style="display: flex; gap: 10px;">
                <button onclick="openHistory()" class="btn btn-log">📜 翻查紀錄</button>
                <button onclick="uploadData()" class="btn btn-sync">💾 儲存並同步</button>
            </div>
        </div>

        <button id="batchBtn" onclick="openBatchModal()" class="btn" style="background:#2563eb; color:white; display:none; margin-bottom:10px;">🎁 批量領取 (<span id="selCount">0</span>)</button>

        <table>
            <thead>
                <tr>
                    <th style="width:40px;"><input type="checkbox" onchange="toggleAll(this)"></th>
                    <th>編號</th>
                    <th>電訊商</th>
                    <th>可用量</th>
                    <th>使用地點</th>
                    <th>領取人</th>
                    <th>更新時間</th>
                </tr>
            </thead>
            <tbody id="simTable"></tbody>
        </table>
    </div>

    <div id="batchModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">🎁 批量領取確認</h2>
            <label>領取人員</label>
            <select id="batchStaff">
                <option value="Leo">Leo</option><option value="Mason">Mason</option>
                <option value="Mayce">Mayce</option><option value="Sherman">Sherman</option>
                <option value="ting ting">ting ting</option><option value="Jenna">Jenna</option>
                <option value="Roy">Roy</option><option value="Arron">Arron</option>
                <option value="solar">solar</option><option value="Willam">Willam</option>
                <option value="hanson">hanson</option>
            </select>
            <label>使用地點</label>
            <input type="text" id="batchLoc" placeholder="輸入地點 (例如：櫃桶)">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="closeModal()" class="btn" style="flex:1; background:#f1f5f9;">取消</button>
                <button onclick="confirmBatchClaim()" class="btn" style="flex:1; background:#2563eb; color:white;">確認領取</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzj267eGvH4IA8Ra5W35K56tjKCOdNU_VEB42AwYFcERh3qBtCBOoziwjQAgYanvNWW/exec";
        let simRecords = [];
        let selectedIndices = new Set();

        window.onload = function() {
            alert("Mason is watching you 👀");
            loadData();
        };

        function openHistory() {
            window.open("https://docs.google.com/spreadsheets/d/1QsQ19xSbsMXjcSa7hzItjOiQnwEoVtwpP3oPfcAp3MM/edit?hl=zh-tw&gid=0#gid=0");
        }

        async function loadData() {
            try {
                const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
                simRecords = await res.json();
                render();
            } catch(e) { console.error("載入失敗", e); }
        }

        function render() {
            const tbody = document.getElementById('simTable');
            tbody.innerHTML = simRecords.map((r, i) => `
                <tr>
                    <td><input type="checkbox" onchange="toggleRow(${i})" ${selectedIndices.has(i) ? 'checked' : ''}></td>
                    <td>${r.id}</td>
                    <td>${r.telco}</td>
                    <td>${r.remains}</td>
                    <td>${r.location || '---'}</td>
                    <td style="color:#2563eb; font-weight:bold;">${r.staff || '---'}</td>
                    <td style="font-size:11px; color:#94a3b8;">${r.date || '---'}</td>
                </tr>
            `).join('');
            document.getElementById('batchBtn').style.display = selectedIndices.size > 0 ? 'inline-flex' : 'none';
            document.getElementById('selCount').innerText = selectedIndices.size;
        }

        // --- 核心修正：名字與按鈕對應，並加入 Action LOGS ---
        function confirmBatchClaim() {
            const staff = document.getElementById('batchStaff').value;
            const loc = document.getElementById('batchLoc').value || "---";

            selectedIndices.forEach(idx => {
                const r = simRecords[idx];
                const oldStaff = r.staff || "---";
                
                // 產生操作描述 (Action)
                r.action = (oldStaff === "---") ? `由 ${staff} 領取 (地點: ${loc})` : `由 ${oldStaff} 轉交給 ${staff} (地點: ${loc})`;
                
                // 更新資料
                r.staff = staff;
                r.location = loc;
                r.date = new Date().toLocaleString('zh-HK', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
            });

            selectedIndices.clear();
            render();
            closeModal();
            alert("✅ 領取成功！請按『儲存並同步』寫入試算表。");
        }

        function toggleRow(i) { selectedIndices.has(i) ? selectedIndices.delete(i) : selectedIndices.add(i); render(); }
        function toggleAll(el) { selectedIndices.clear(); if (el.checked) simRecords.forEach((_, i) => selectedIndices.add(i)); render(); }
        function openBatchModal() { document.getElementById('batchModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('batchModal').style.display = 'none'; }
        
        async function uploadData() {
            alert("正在同步至雲端...");
            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(simRecords) });
                alert("✅ 同步成功！");
            } catch(e) { alert("❌ 同步失敗"); }
        }
    </script>
</body>
</html>
