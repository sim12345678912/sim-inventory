<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SIM Management System v3.8</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; border: none; display: flex; align-items: center; gap: 5px; }
        .btn-sync { background: #f59e0b; color: white; }
        .btn-sync.dirty { background: #10b981 !important; }
        
        /* 回歸深色表格頭部 */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #334155; color: #f8fafc; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        tr:hover { background: #fbfcfd; }
        
        /* Action 欄位特殊處理 */
        .action-history { font-size: 11px; color: #64748b; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .action-history:hover { white-space: normal; word-break: break-all; cursor: help; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 350px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.7); z-index: 200; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loader">Processing...</div>
    <div class="container">
        <div class="header">
            <h2>SIM <b>Management System</b> v3.8</h2>
            <div style="display:flex; gap:10px;">
                <button onclick="loadData()" class="btn" style="background:#e2e8f0;">🔄 刷新</button>
                <button onclick="syncData()" id="syncBtn" class="btn btn-sync">💾 儲存並同步至雲端</button>
            </div>
        </div>

        <div style="margin-bottom:15px; display:flex; gap:10px;">
            <input type="text" id="search" placeholder="🔍 搜尋 ID, 人員..." oninput="render()" style="margin:0; flex:1;">
            <div id="batchMenu" style="display:none; gap:10px;">
                <button onclick="openBatchModal()" class="btn" style="background:#2563eb; color:white;">🎁 批量領取</button>
                <button onclick="batchReturn()" class="btn" style="background:#fee2e2; color:#b91c1c;">🧹 批量歸還</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width:30px;"><input type="checkbox" id="allBox" onchange="selectAll()"></th>
                    <th style="width:60px;">編號</th><th style="width:100px;">電訊商</th><th style="width:100px;">可用量</th>
                    <th style="width:120px;">到期日</th><th style="width:100px;">持有人</th><th style="width:100px;">更新時間</th><th>流水帳紀錄</th><th style="width:60px;">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="editModal" class="modal"><div class="modal-content"><h3>編輯資訊</h3><label>用量 (GB)</label><input id="editRemains"><label>地點</label><input id="editLoc"><label>人員</label><select id="editStaff"></select><button onclick="saveEdit()" class="btn" style="background:#2563eb; color:white; width:100%; justify-content:center;">儲存</button><button onclick="closeModal()" class="btn" style="width:100%; justify-content:center; margin-top:5px;">取消</button></div></div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzcIVqm14RBzQwRNAxbEAG2Xb-G6orPIlPm5W1PKN3Cco2bBFSdvuRSKaMXVccFsV1f/exec";
        const STAFFS = ["Leo", "Mason", "Mayce", "Sherman", "ting ting", "Jenna", "Roy", "Arron", "solar", "Willam", "hanson"];
        let db = [], selected = new Set(), editIdx = null;

        // 流水帳累加器
        function log(idx, msg) {
            const t = new Date();
            const ts = `${(t.getMonth()+1).toString().padStart(2,'0')}/${t.getDate().toString().padStart(2,'0')} ${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
            const s = db[idx].staff === "---" ? "系統" : db[idx].staff;
            const entry = `[${ts} ${s} ${msg}]`;
            db[idx].action = (db[idx].action && db[idx].action !== "---") ? db[idx].action + " > " + entry : entry;
        }

        window.onload = () => {
            const sel = document.getElementById('editStaff');
            sel.add(new Option("-- 未領取 --", "---"));
            STAFFS.forEach(n => sel.add(new Option(n, n)));
            loadData();
        };

        async function loadData() {
            document.getElementById('loader').style.display='flex';
            const r = await fetch(API + "?t=" + Date.now());
            db = await r.json();
            render();
            document.getElementById('loader').style.display='none';
        }

        function render() {
            const kw = document.getElementById('search').value.toLowerCase();
            document.getElementById('tableBody').innerHTML = db.map((r, i) => {
                if(kw && !r.id.toLowerCase().includes(kw) && !r.staff.toLowerCase().includes(kw)) return "";
                const isSel = selected.has(i);
                return `<tr style="${isSel?'background:#f0f7ff':''}">
                    <td><input type="checkbox" ${isSel?'checked':''} onchange="toggle(${i})"></td>
                    <td><b>${r.id}</b></td><td>${r.telco}</td><td>${r.remains}</td><td>${r.expiry}</td>
                    <td style="color:#2563eb; font-weight:600;">${r.staff}</td>
                    <td style="color:#94a3b8; font-size:11px;">${r.date}</td>
                    <td class="action-history">${r.action || '---'}</td>
                    <td><button onclick="openEdit(${i})" style="background:#334155; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">改</button></td>
                </tr>`;
            }).join('');
            document.getElementById('batchMenu').style.display = selected.size > 0 ? 'flex' : 'none';
        }

        function openEdit(i) {
            editIdx = i; const r = db[i];
            document.getElementById('editRemains').value = r.remains.replace(" GB","")==="---"?"":r.remains.replace(" GB","");
            document.getElementById('editLoc').value = r.location==="---"?"":r.location;
            document.getElementById('editStaff').value = r.staff;
            document.getElementById('editModal').style.display = 'flex';
        }

        function saveEdit() {
            const r = db[editIdx], ns = document.getElementById('editStaff').value;
            log(editIdx, r.staff !== ns ? `領取人變更: ${ns}` : `更新數據`);
            r.staff = ns;
            r.remains = document.getElementById('editRemains').value ? document.getElementById('editRemains').value + " GB" : "---";
            r.location = document.getElementById('editLoc').value || "---";
            r.usage = (ns === "---") ? "在庫" : "已領用";
            updateTime(editIdx); setDirty(true); closeModal(); render();
        }

        function batchReturn() {
            selected.forEach(i => {
                log(i, "批量歸還");
                db[i].staff = "---"; db[i].usage = "在庫"; updateTime(i);
            });
            selected.clear(); setDirty(true); render();
        }

        function updateTime(i) {
            const t = new Date();
            db[i].date = `${(t.getMonth()+1).toString().padStart(2,'0')}/${t.getDate().toString().padStart(2,'0')} ${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
        }
        function setDirty(d) { document.getElementById('syncBtn').classList.toggle('dirty', d); }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        function toggle(i) { selected.has(i) ? selected.delete(i) : selected.add(i); render(); }
        function selectAll() {
            const c = document.getElementById('allBox').checked;
            selected.clear(); if(c) db.forEach((_,i)=>selected.add(i)); render();
        }

        async function syncData() {
            document.getElementById('loader').style.display='flex';
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(db) });
            setDirty(false); alert("✅ 同步成功！");
            document.getElementById('loader').style.display='none';
        }
    </script>
</body>
</html>
