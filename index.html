<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM Management System v3.8</title>
    <style>
        /* 基礎 UI：維持你截圖中的深色簡約風格與配色 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 1440px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; }
        .header h1 { font-size: 24px; margin: 0; color: #1e293b; }
        .header h1 span { color: #3b82f6; font-weight: 400; }
        
        .btn-group { display: flex; gap: 12px; }
        .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; transition: all 0.2s; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .btn-refresh { background-color: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-sync { background-color: #f59e0b; color: white; }
        .btn-sync.is-dirty { background-color: #10b981 !important; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }

        /* 表格：回歸深色 Header 與 Checkbox 邏輯 */
        .table-wrap { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        th { background-color: #1e293b; color: #f8fafc; padding: 15px 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        tr:hover { background-color: #f8fafc; }
        tr.selected-row { background-color: #eff6ff !important; }

        /* 流水帳 Action 欄位顯示：Hover 展開 */
        .action-log { color: #64748b; font-size: 11px; font-style: italic; }
        .action-log:hover { white-space: normal; word-break: break-all; cursor: help; color: #1e293b; position: relative; background: #fff; padding: 5px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 10; }

        /* 搜尋與批量工具列 (黃色區域) */
        .toolbar { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        .search-box { flex: 1; position: relative; }
        .search-box input { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #e2e8f0; outline: none; font-size: 14px; transition: border 0.2s; }
        .search-box input:focus { border-color: #3b82f6; }
        
        .batch-box { display: none; background-color: #fef3c7; padding: 10px 20px; border-radius: 10px; border: 1px solid #fde68a; align-items: center; gap: 15px; }

        /* 彈窗 Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-content h3 { margin-top: 0; margin-bottom: 20px; font-size: 18px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #475569; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; color: #1e293b; }
    </style>
</head>
<body>

    <div id="loading-overlay">⌛ 正在同步...</div>

    <div class="container">
        <header class="header">
            <h1>SIM <span>Management System</span> v3.8</h1>
            <div class="btn-group">
                <button onclick="fetchData()" class="btn btn-refresh">🔄 重新讀取</button>
                <button onclick="saveToCloud()" id="syncBtn" class="btn btn-sync">💾 儲存並同步</button>
            </div>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="filter" placeholder="🔍 搜尋..." oninput="drawTable()">
            </div>
            <div id="batchTool" class="batch-box">
                <span style="font-size:13px; font-weight:700;">已揀選 <span id="countText">0</span> 項</span>
                <button onclick="openBatchModal()" class="btn" style="background:#2563eb; color:white; padding:6px 12px;">🎁 批量領取</button>
                <button onclick="doBatchReturn()" class="btn" style="background:#ef4444; color:white; padding:6px 12px;">🧹 批量歸還</button>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" id="checkAll" onchange="toggleSelectAll()"></th>
                        <th style="width: 80px;">ID</th>
                        <th style="width: 120px;">電訊商</th>
                        <th style="width: 110px;">可用量</th>
                        <th style="width: 120px;">到期日</th>
                        <th style="width: 110px;">持有人</th>
                        <th style="width: 140px;">最後更新時間</th>
                        <th>流水帳紀錄 (Action History)</th>
                        <th style="width: 60px;">操作</th>
                    </tr>
                </thead>
                <tbody id="simBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h3>編輯卡片</h3>
            <div class="form-group"><label>可用用量 (GB)</label><input type="text" id="mUsage"></div>
            <div class="form-group"><label>存放地點</label><input type="text" id="mLoc"></div>
            <div class="form-group"><label>指派人員</label><select id="mStaff"></select></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModals()" class="btn" style="flex:1;">取消</button>
                <button onclick="submitSingleSave()" class="btn" style="flex:1; background:#2563eb; color:white; justify-content:center;">儲存</button>
            </div>
        </div>
    </div>

    <div id="batchModal" class="modal-overlay">
        <div class="modal-content">
            <h3>🎁 批量領取</h3>
            <div class="form-group"><label>領用人</label><select id="bStaff"></select></div>
            <div class="form-group"><label>存放地點</label><input type="text" id="bLoc"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModals()" class="btn" style="flex:1;">取消</button>
                <button onclick="submitBatchClaim()" class="btn" style="flex:1; background:#2563eb; color:white; justify-content:center;">確認批量修改</button>
            </div>
        </div>
    </div>

    <script>
        // -------------------------------------------------------------------------
        // 配置區：使用你提供的最新 Web App URL
        // -------------------------------------------------------------------------
        const GAS_URL = "https://script.google.com/macros/s/AKfycbymzIapKW1OmShSYXaQFgv6Rltx4OzeUMjL90DfgLKZfPhPjqYwvSexSfZtnnKtLGNB/exec";
        const NAMES = ["Leo", "Mason", "Mayce", "Sherman", "ting ting", "Jenna", "Roy", "Arron", "solar", "Willam", "hanson"];
        
        let simData = [];
        let selectedIndices = new Set();
        let activeIdx = null;

        window.onload = function() {
            const dropdowns = [document.getElementById('mStaff'), document.getElementById('bStaff')];
            dropdowns.forEach(sel => {
                sel.add(new Option("-- 在庫 --", "---"));
                NAMES.forEach(n => sel.add(new Option(n, n)));
            });
            fetchData();
        };

        // 【流水帳累加核心】：這是你要求的重點功能
        function logAction(idx, text) {
            const n = new Date();
            const time = `${(n.getMonth()+1).toString().padStart(2,'0')}/${n.getDate().toString().padStart(2,'0')} ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
            const staff = simData[idx].staff === "---" ? "ADMIN" : simData[idx].staff;
            const newLog = `[${time} ${staff}: ${text}]`;

            // 如果已有內容則用 > 分隔，否則直接寫入
            if (simData[idx].action && simData[idx].action !== "---") {
                simData[idx].action = simMaster[idx].action + " > " + newLog; // 修正變數名為 simData
                simData[idx].action = simData[idx].action.replace(/undefined/g, ""); // 防止初次錯誤
            } else {
                simData[idx].action = newLog;
            }
        }

        async function fetchData() {
            toggleLoader(true);
            try {
                const r = await fetch(GAS_URL + "?t=" + Date.now());
                simData = await r.json();
                drawTable();
            } catch (e) { alert("讀取失敗"); }
            toggleLoader(false);
        }

        function drawTable() {
            const tbody = document.getElementById('simBody');
            const q = document.getElementById('filter').value.toLowerCase();
            
            tbody.innerHTML = simData.map((r, i) => {
                if (q && !r.id.toLowerCase().includes(q) && !r.staff.toLowerCase().includes(q)) return "";
                const isSel = selectedIndices.has(i);
                return `<tr class="${isSel ? 'selected-row' : ''}">
                    <td><input type="checkbox" ${isSel ? 'checked' : ''} onchange="toggleRow(${i})"></td>
                    <td style="font-weight:700;">${r.id}</td>
                    <td>${r.telco}</td><td>${r.remains}</td><td>${r.expiry}</td>
                    <td style="color:#2563eb; font-weight:800;">${r.staff}</td>
                    <td style="color:#94a3b8; font-size:11px;">${r.date}</td>
                    <td class="action-log">${r.action || '---'}</td>
                    <td><button onclick="openEdit(${i})" style="background:#334155; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">編輯</button></td>
                </tr>`;
            }).join('');

            document.getElementById('batchTool').style.display = selectedIndices.size > 0 ? 'flex' : 'none';
            document.getElementById('countText').innerText = selectedIndices.size;
        }

        function openEdit(i) {
            activeIdx = i; const r = simData[i];
            document.getElementById('mUsage').value = r.remains.replace(" GB", "") === "---" ? "" : r.remains.replace(" GB", "");
            document.getElementById('mLoc').value = r.location === "---" ? "" : r.location;
            document.getElementById('mStaff').value = r.staff;
            document.getElementById('editModal').style.display = 'flex';
        }

        function submitSingleSave() {
            const r = simData[activeIdx];
            const ns = document.getElementById('mStaff').value;
            
            // 寫入流水帳
            if (r.staff !== ns) logAction(activeIdx, `人員異動為 ${ns}`);
            else logAction(activeIdx, `更新狀態資訊`);

            r.staff = ns;
            r.remains = document.getElementById('mUsage').value ? document.getElementById('mUsage').value + " GB" : "---";
            r.location = document.getElementById('mLoc').value || "---";
            r.usage = (ns === "---") ? "在庫" : "已領用";
            
            stampDate(activeIdx);
            setDirty(true);
            closeModals();
            drawTable();
        }

        function openBatchModal() { document.getElementById('batchModal').style.display = 'flex'; }

        function submitBatchClaim() {
            const bs = document.getElementById('bStaff').value;
            const bl = document.getElementById('bLoc').value;
            
            selectedIndices.forEach(idx => {
                logAction(idx, `批量領取: ${bs}`);
                simData[idx].staff = bs;
                if(bl) simData[idx].location = bl;
                simData[idx].usage = (bs === "---") ? "在庫" : "已領用";
                stampDate(idx);
            });
            
            selectedIndices.clear();
            document.getElementById('checkAll').checked = false;
            setDirty(true);
            closeModals();
            drawTable();
        }

        function doBatchReturn() {
            if(!confirm("確定歸還？")) return;
            selectedIndices.forEach(idx => {
                logAction(idx, "批量歸還");
                simData[idx].staff = "---";
                simData[idx].usage = "在庫";
                stampDate(idx);
            });
            selectedIndices.clear();
            setDirty(true);
            drawTable();
        }

        function stampDate(idx) {
            const n = new Date();
            simData[idx].date = `${(n.getMonth()+1).toString().padStart(2,'0')}/${n.getDate().toString().padStart(2,'0')} ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
        }

        async function saveToCloud() {
            toggleLoader(true);
            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(simData) });
                setDirty(false);
                alert("✅ 同步成功！流水帳已存檔。");
            } catch (e) { alert("同步失敗"); }
            toggleLoader(false);
        }

        function toggleLoader(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
        function setDirty(d) { document.getElementById('syncBtn').classList.toggle('is-dirty', d); }
        function closeModals() { 
            document.getElementById('editModal').style.display = 'none'; 
            document.getElementById('batchModal').style.display = 'none'; 
        }
        function toggleRow(i) { selectedIndices.has(i) ? selectedIndices.delete(i) : selectedIndices.add(i); drawTable(); }
        function toggleSelectAll() {
            const c = document.getElementById('checkAll').checked;
            selectedIndices.clear();
            if(c) simData.forEach((_, i) => selectedIndices.add(i));
            drawTable();
        }
    </script>
</body>
</html>
