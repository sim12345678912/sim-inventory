<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM 雲端管理系統 - 批量終極優化版</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f1f5f9; padding: 20px; color: #334155; margin: 0; }
        .container { max-width: 1350px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* 數據看板 */
        .dashboard { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; flex: 1; min-width: 120px; text-align: center; }
        .stat-card .label { font-size: 11px; color: #64748b; font-weight: bold; }
        .stat-card .value { font-size: 24px; font-weight: 900; color: #1e293b; }

        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px; }
        h1 { margin: 0; font-size: 26px; }
        h1 span { color: #3b82f6; }

        /* 工具列 */
        .tool-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: #f8fafc; padding: 12px 15px; border-radius: 15px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; padding: 10px 15px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.3s; }
        
        /* 按鈕樣式 */
        .btn { padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; }
        .btn-refresh { background: #fff; border: 1px solid #e2e8f0; color: #475569; }
        .btn-sync { background: #f59e0b; color: white; }
        .btn-sync.dirty { background: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .btn-excel { background: #059669; color: white; }
        
        /* 頁尾與重設按鈕 */
        .footer-tools { margin-top: 40px; padding-top: 20px; border-top: 1px dashed #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .btn-reset-all { background: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0; }
        .btn-reset-all:hover { background: #be123c; color: white; }

        /* 批量操作 */
        .batch-btn-group { display: none; gap: 10px; } 
        .btn-batch-edit { background: #3b82f6; color: white; }
        .btn-batch-reset { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #1e293b; color: #94a3b8; padding: 15px 10px; text-align: left; font-size: 11px; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
        tr.selected { background-color: #eff6ff !important; }
        
        .checkbox-cell { width: 40px; text-align: center; }
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; }
        .badge-stock { background: #dcfce7; color: #166534; }
        .badge-used { background: #dbeafe; color: #1e40af; }
        
        .btn-edit { background: #334155; color: white; padding: 6px 12px; border-radius: 8px; cursor:pointer; font-weight: bold; border:none; }

        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 9000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        input, select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-weight: bold; outline: none; }
    </style>
</head>
<body>

    <div id="loader">⚙️ 正在處理雲端數據...</div>

    <div class="container">
        <div class="dashboard">
            <div class="stat-card"><div class="label">總卡片</div><div id="statTotal" class="value">0</div></div>
            <div class="stat-card"><div class="label">在庫</div><div id="statInStock" class="value" style="color:#10b981">0</div></div>
            <div class="stat-card"><div class="label">已領用</div><div id="statUsed" class="value" style="color:#3b82f6">0</div></div>
        </div>

        <div class="header-box">
            <h1>SIM <span>Cloud</span></h1>
            <div style="display: flex; gap: 10px;">
                <button onclick="fetchData()" class="btn btn-refresh">🔄 刷新</button>
                <button onclick="exportToExcel()" class="btn btn-excel">📥 匯出 Excel</button>
                <button onclick="syncData()" id="syncBtn" class="btn btn-sync">💾 儲存並同步</button>
            </div>
        </div>

        <div class="tool-bar">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋 ID、人員或電訊商..." oninput="renderTable()">
            <div id="batchTools" class="batch-btn-group">
                <button onclick="openBatchEdit()" class="btn btn-batch-edit">📝 批量修改 (<span id="selectCount">0</span>)</button>
                <button onclick="batchReset()" class="btn btn-batch-reset">🧹 批量清除領取</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="checkbox-cell"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                    <th style="text-align:center; width:60px;">編號</th>
                    <th>狀態</th>
                    <th>電訊商</th>
                    <th>用量</th>
                    <th>到期日</th>
                    <th>地點</th>
                    <th>領取人</th>
                    <th style="text-align:center">操作</th>
                </tr>
            </thead>
            <tbody id="simTable"></tbody>
        </table>

        <!-- 底部工具欄 -->
        <div class="footer-tools">
            <p style="color: #94a3b8; font-size: 12px;">系統版本 v2.5 | 批量優化版</p>
            <button onclick="resetAllRecords()" class="btn btn-reset-all">⚠️ 重設紀錄 (危險)</button>
        </div>
    </div>

    <!-- 批量修改視窗 -->
    <div id="batchEditModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">批量修改 <span id="batchCountText" style="color:#3b82f6"></span> 項</h2>
            <input type="text" id="batchRemains" placeholder="剩餘用量 (如: 10GB)">
            <input type="text" id="batchLoc" placeholder="存放地點">
            <input type="text" id="batchStaff" placeholder="領取人員">
            <div style="display: flex; gap: 10px;">
                <button onclick="closeModal('batchEditModal')" class="btn" style="flex:1; background:#f1f5f9;">取消</button>
                <button onclick="confirmBatchSave()" class="btn" style="flex:1; background:#3b82f6; color:white;">確認更新</button>
            </div>
        </div>
    </div>

    <!-- 單個修改視窗 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0;">編輯卡片</h2>
            <input type="hidden" id="editIndex">
            <label style="font-size:12px; color:#64748b">電訊商</label>
            <input type="text" id="editTelco">
            <label style="font-size:12px; color:#64748b">剩餘用量</label>
            <input type="text" id="editRemains">
            <label style="font-size:12px; color:#64748b">到期日</label>
            <input type="date" id="editExpiry">
            <label style="font-size:12px; color:#64748b">領取人</label>
            <input type="text" id="editStaff" placeholder="留空視為在庫">
            <div style="display: flex; gap: 10px;">
                <button onclick="closeModal('editModal')" class="btn" style="flex:1; background:#f1f5f9;">取消</button>
                <button onclick="saveSingle()" class="btn" style="flex:1; background:#3b82f6; color:white;">儲存修改</button>
            </div>
        </div>
    </div>

    <script>
        let simData = JSON.parse(localStorage.getItem('simData')) || [
            { id: 1, telco: 'CSL', remains: '50GB', expiry: '2024-12-31', loc: '櫃 A', staff: '' },
            { id: 2, telco: 'SmarTone', remains: '10GB', expiry: '2024-11-20', loc: '櫃 B', staff: '阿強' }
        ];

        let selectedIds = new Set();
        let isDirty = false;

        function renderTable() {
            const tbody = document.getElementById('simTable');
            const search = document.getElementById('searchInput').value.toLowerCase();
            tbody.innerHTML = '';

            let inStock = 0, used = 0;

            simData.forEach((item, index) => {
                if (item.staff) used++; else inStock++;

                if (item.telco.toLowerCase().includes(search) || item.staff.toLowerCase().includes(search)) {
                    const row = document.createElement('tr');
                    if (selectedIds.has(item.id)) row.classList.add('selected');
                    
                    row.innerHTML = `
                        <td class="checkbox-cell"><input type="checkbox" ${selectedIds.has(item.id) ? 'checked' : ''} onchange="toggleSelect(${item.id})"></td>
                        <td style="text-align:center">${item.id}</td>
                        <td><span class="badge ${item.staff ? 'badge-used' : 'badge-stock'}">${item.staff ? '已領用' : '在庫'}</span></td>
                        <td><b>${item.telco}</b></td>
                        <td>${item.remains}</td>
                        <td>${item.expiry}</td>
                        <td>${item.loc}</td>
                        <td>${item.staff || '-'}</td>
                        <td style="text-align:center"><button class="btn-edit" onclick="openEdit(${index})">編輯</button></td>
                    `;
                    tbody.appendChild(row);
                }
            });

            document.getElementById('statTotal').innerText = simData.length;
            document.getElementById('statInStock').innerText = inStock;
            document.getElementById('statUsed').innerText = used;
            updateBatchUI();
        }

        function toggleSelect(id) {
            selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
            renderTable();
        }

        function toggleSelectAll() {
            const allChecked = document.getElementById('selectAll').checked;
            selectedIds = allChecked ? new Set(simData.map(d => d.id)) : new Set();
            renderTable();
        }

        function updateBatchUI() {
            const bar = document.getElementById('batchTools');
            const count = document.getElementById('selectCount');
            if (selectedIds.size > 0) {
                bar.style.display = 'flex';
                count.innerText = selectedIds.size;
            } else {
                bar.style.display = 'none';
            }
        }

        function openEdit(index) {
            const item = simData[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('editTelco').value = item.telco;
            document.getElementById('editRemains').value = item.remains;
            document.getElementById('editExpiry').value = item.expiry;
            document.getElementById('editStaff').value = item.staff;
            document.getElementById('editModal').style.display = 'flex';
        }

        function saveSingle() {
            const index = document.getElementById('editIndex').value;
            simData[index].telco = document.getElementById('editTelco').value;
            simData[index].remains = document.getElementById('editRemains').value;
            simData[index].expiry = document.getElementById('editExpiry').value;
            simData[index].staff = document.getElementById('editStaff').value;
            markDirty();
            closeModal('editModal');
            renderTable();
        }

        function openBatchEdit() {
            document.getElementById('batchCountText').innerText = selectedIds.size;
            document.getElementById('batchEditModal').style.display = 'flex';
        }

        function confirmBatchSave() {
            const r = document.getElementById('batchRemains').value;
            const l = document.getElementById('batchLoc').value;
            const s = document.getElementById('batchStaff').value;
            
            simData.forEach(item => {
                if (selectedIds.has(item.id)) {
                    if (r) item.remains = r;
                    if (l) item.loc = l;
                    if (s) item.staff = s;
                }
            });
            markDirty();
            closeModal('batchEditModal');
            selectedIds.clear();
            renderTable();
        }

        function batchReset() {
            if(confirm('確定要清除選中項目的領取人紀錄嗎？')) {
                simData.forEach(item => {
                    if (selectedIds.has(item.id)) item.staff = '';
                });
                markDirty();
                selectedIds.clear();
                renderTable();
            }
        }

        function markDirty() {
            isDirty = true;
            document.getElementById('syncBtn').classList.add('dirty');
        }

        function syncData() {
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                localStorage.setItem('simData', JSON.stringify(simData));
                isDirty = false;
                document.getElementById('syncBtn').classList.remove('dirty');
                document.getElementById('loader').style.display = 'none';
                alert('數據已同步至雲端（本地暫存）');
            }, 800);
        }

        function resetAllRecords() {
            if (confirm('⚠️ 警告：這將會重置所有 SIM 卡狀態，確定嗎？')) {
                simData.forEach(d => { d.staff = ''; d.remains = '50GB'; });
                localStorage.removeItem('simData');
                renderTable();
            }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function exportToExcel() {
            alert('正在生成 Excel 報表...');
            // 這裡通常會串接 SheetJS 等 Library
        }

        function fetchData() {
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                renderTable();
            }, 500);
        }

        // 初始化
        renderTable();
    </script>
</body>
</html>
