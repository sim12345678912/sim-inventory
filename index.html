<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM 雲端管理系統 - 批量終極優化版</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f1f5f9; padding: 20px; color: #334155; margin: 0; }
        .container { max-width: 1350px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* 數據看板 */
        .dashboard { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; flex: 1; min-width: 120px; text-align: center; }
        .stat-card .label { font-size: 11px; color: #64748b; font-weight: bold; }
        .stat-card .value { font-size: 24px; font-weight: 900; color: #1e293b; }

        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px; }
        h1 { margin: 0; font-size: 26px; }
        h1 span { color: #3b82f6; }

        /* 工具列 */
        .tool-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: #f8fafc; padding: 12px 15px; border-radius: 15px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; padding: 10px 15px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.3s; }
        
        /* 按鈕樣式 */
        .btn { padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; }
        .btn-refresh { background: #fff; border: 1px solid #e2e8f0; color: #475569; }
        .btn-sync { background: #f59e0b; color: white; }
        .btn-sync.dirty { background: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .btn-excel { background: #059669; color: white; }
        .btn-reset-all { background: #1e293b; color: white; }

        /* 批量操作按鈕組 */
        .batch-btn-group { display: none; gap: 10px; } 
        .btn-batch-edit { background: #3b82f6; color: white; }
        .btn-batch-reset { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #1e293b; color: #94a3b8; padding: 15px 10px; text-align: left; font-size: 11px; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
        tr.selected { background-color: #eff6ff !important; }
        
        .checkbox-cell { width: 40px; text-align: center; }
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; }
        .badge-stock { background: #dcfce7; color: #166534; }
        .badge-used { background: #dbeafe; color: #1e40af; }
        
        .quick-edit-btn { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; margin-left: 5px; background: #f1f5f9; border-radius: 5px; cursor: pointer; color: #94a3b8; border: 1px solid #e2e8f0; font-size: 10px; }
        .btn-edit { background: #334155; color: white; padding: 6px 12px; border-radius: 8px; cursor:pointer; font-weight: bold; border:none; }
        .btn-reset-single { color: #cbd5e1; font-size: 18px; border:none; background:none; cursor:pointer; padding: 0 5px; }

        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 9000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        input, select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-weight: bold; outline: none; }
        .telco-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .telco-btn { padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; background: #fff; cursor: pointer; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="loader">⚙️ 正在處理雲端數據...</div>

    <div class="container">
        <!-- 數據看板 -->
        <div class="dashboard">
            <div class="stat-card"><div class="label">總卡片</div><div id="statTotal" class="value">0</div></div>
            <div class="stat-card"><div class="label">在庫</div><div id="statInStock" class="value" style="color:#10b981">0</div></div>
            <div class="stat-card"><div class="label">已領用</div><div id="statUsed" class="value" style="color:#3b82f6">0</div></div>
        </div>

        <div class="header-box">
            <h1>SIM <span>Cloud</span></h1>
            <div style="display: flex; gap: 10px;">
                <button onclick="loadData()" class="btn btn-refresh">🔄 刷新</button>
                <button onclick="exportToExcel()" class="btn btn-excel">📥 匯出 Excel</button>
                <button onclick="uploadData()" id="syncBtn" class="btn btn-sync">💾 儲存並同步</button>
                <button onclick="resetAllRecords()" class="btn btn-reset-all">⚠️ 重設紀錄</button>
            </div>
        </div>

        <div class="tool-bar">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋 ID、人員或電訊商..." oninput="render()">
            <div id="batchTools" class="batch-btn-group">
                <button onclick="openBatchEdit()" class="btn btn-batch-edit">📝 批量修改 (<span id="selectCount">0</span>)</button>
                <button onclick="batchReset()" class="btn btn-batch-reset">🧹 批量清除領取</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="checkbox-cell"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                    <th style="text-align:center; width:60px;">編號</th>
                    <th>狀態</th>
                    <th>電訊商</th>
                    <th>用量</th>
                    <th>到期日</th>
                    <th>地點</th>
                    <th>領取人</th>
                    <th style="text-align:center">更新時間</th>
                    <th style="text-align:center">操作</th>
                </tr>
            </thead>
            <tbody id="simTable"></tbody>
        </table>
    </div>

    <!-- 批量修改視窗 (僅保留 3 項：用量、地點、人員) -->
    <div id="batchEditModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">批量修改 <span id="batchCountText" style="color:#3b82f6"></span> 項</h2>
            <p style="font-size:11px; color:#94a3b8; margin-bottom:15px;">* 留空表示不變更該欄位</p>
            <label style="font-size:11px; font-weight:bold; color:#64748b;">剩餘用量</label>
            <input type="text" id="batchRemains" placeholder="例如: 10GB">
            <label style="font-size:11px; font-weight:bold; color:#64748b;">存放地點</label>
            <input type="text" id="batchLoc" placeholder="例如: 抽屜 A1">
            <label style="font-size:11px; font-weight:bold; color:#64748b;">提取人員</label>
            <select id="batchStaff"></select>
            <div style="display: flex; gap: 10px;">
                <button onclick="closeModal('batchEditModal')" class="btn" style="flex:1; background:#f1f5f9;">取消</button>
                <button onclick="confirmBatchSave()" class="btn" style="flex:1; background:#3b82f6; color:white;">確認更新</button>
            </div>
        </div>
    </div>

    <!-- 單個修改視窗 -->
    <div id="editModal" class="modal"><div class="modal-content"><h2 id="modalTitle" style="margin-top:0;">編輯資訊</h2><label>用量</label><input type="text" id="inputUsageVal"><label>地點</label><input type="text" id="inputLoc"><label>人員</label><select id="selectStaff" style="background:#eff6ff; color:#1d4ed8;"></select><div style="display: flex; gap: 10px;"><button onclick="closeModal('editModal')" class="btn" style="flex:1; background:#f1f5f9;">取消</button><button onclick="confirmSave()" class="btn" style="flex:1; background:#2563eb; color:white;">確認</button></div></div></div>
    <div id="telcoModal" class="modal"><div class="modal-content"><h2 style="margin-top:0;">選擇電訊商</h2><div class="telco-grid" id="telcoBtnGroup"></div><button onclick="closeModal('telcoModal')" class="btn" style="width:100%; margin-top:20px; background:#f1f5f9;">關閉</button></div></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzj267eGvH4IA8Ra5W35K56tjKCOdNU_VEB42AwYFcERh3qBtCBOoziwjQAgYanvNWW/exec"; 

        const userList = ["Leo", "Mason", "Mayce", "Sherman", "ting ting", "Jenna", "Roy", "Arron", "solar", "Willam", "hanson"];
        const telcoList = ["CSL", "3HK", "SmarTone", "CMHK", "Lucky SIM", "MORE", "鴨聊佳"];
        const totalSIMs = 30; 

        let simRecords = []; let selectedIndices = new Set(); let currentIdx = null; let isDirty = false;

        window.onload = function() {
            const s1 = document.getElementById('selectStaff'); const s2 = document.getElementById('batchStaff');
            const opts = [new Option("-- 未領取 --", "---"), ...userList.map(n => new Option(n, n))];
            opts.forEach(o => s1.add(o.cloneNode(true))); s2.add(new Option("-- 不變更 --", "")); opts.forEach(o => s2.add(o.cloneNode(true)));
            const btnGroup = document.getElementById('telcoBtnGroup');
            telcoList.forEach(t => {
                let btn = document.createElement('div'); btn.className = 'telco-btn'; btn.innerText = t;
                btn.onclick = () => { simRecords[currentIdx].telco = t; updateTime(currentIdx); setDirty(true); render(); closeModal('telcoModal'); };
                btnGroup.appendChild(btn);
            });
            let otherBtn = document.createElement('div'); otherBtn.className = 'telco-btn'; otherBtn.innerText = '➕ 其他';
            otherBtn.style.color = '#3b82f6';
            otherBtn.onclick = () => { let c = prompt("手動輸入電訊商:"); if(c) { simRecords[currentIdx].telco = c; updateTime(currentIdx); setDirty(true); render(); closeModal('telcoModal'); } };
            btnGroup.appendChild(otherBtn);
            loadData();
        };

        async function loadData() {
            toggleLoader(true);
            try {
                const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
                const data = await res.json();
                if (Array.isArray(data) && data.length > 0) {
                    simRecords = data.slice(0, totalSIMs);
                    while(simRecords.length < totalSIMs) {
                        simRecords.push({id:"M"+(simRecords.length+1).toString().padStart(2,'0'), telco:"---", remains:"---", expiry:"---", location:"---", usage:"在庫", staff:"---", date:"---"});
                    }
                } else { simRecords = generateInitial(); }
                selectedIndices.clear(); setDirty(false); render();
            } catch(e) { simRecords = generateInitial(); render(); }
            toggleLoader(false);
        }

        async function uploadData() {
            toggleLoader(true);
            try { await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(simRecords) }); setDirty(false); alert("✅ 同步指令已發送！資料正在雲端更新。"); } catch(e) { alert("同步失敗"); }
            toggleLoader(false);
        }

        function setDirty(dirty) { isDirty = dirty; document.getElementById('syncBtn').classList.toggle('dirty', dirty); }

        function render() {
            const tbody = document.getElementById('simTable'); const keyword = document.getElementById('searchInput').value.toLowerCase();
            let counts = { total: simRecords.length, stock: 0, used: 0 };
            tbody.innerHTML = simRecords.map((r, i) => {
                const isMatch = r.id.toLowerCase().includes(keyword) || r.telco.toLowerCase().includes(keyword) || r.staff.toLowerCase().includes(keyword);
                const isUsed = r.staff !== "---"; if(isUsed) counts.used++; else counts.stock++;
                if (!isMatch) return ""; const isChecked = selectedIndices.has(i);
                return `<tr class="${isChecked ? 'selected' : ''}">
                    <td class="checkbox-cell"><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="selectedIndices.has(${i})?selectedIndices.delete(${i}):selectedIndices.add(${i});render();"></td>
                    <td style="text-align:center; font-weight:bold; color:#cbd5e1;">${r.id}</td>
                    <td><span class="badge ${isUsed ? 'badge-used' : 'badge-stock'}">${isUsed ? '已領用' : '在庫'}</span></td>
                    <td><div style="display:flex; align-items:center;"><b>${r.telco}</b><div class="quick-edit-btn" onclick="currentIdx=${i}; document.getElementById('telcoModal').style.display='flex';">✏️</div></div></td>
                    <td><span style="background:#f1f5f9; padding:4px 8px; border-radius:6px; font-weight:800;">${r.remains}</span></td>
                    <td><div style="display:flex; align-items:center;">${r.expiry}<div class="quick-edit-btn" onclick="quickEditExpiry(${i})">✏️</div></div></td>
                    <td>${r.location}</td>
                    <td style="color:#2563eb; font-weight:900;">${r.staff}</td>
                    <td style="font-size:10px; color:#cbd5e1; text-align:center;">${String(r.date)}</td>
                    <td style="text-align:center;"><div style="display:flex; gap:5px; justify-content:center;"><button onclick="openEditModal(${i})" class="btn-edit">改</button><button onclick="resetSingle(${i})" class="btn-reset-single">✕</button></div></td>
                </tr>`;
            }).join('');
            document.getElementById('batchTools').style.display = selectedIndices.size > 0 ? 'flex' : 'none';
            document.getElementById('selectCount').innerText = selectedIndices.size;
            document.getElementById('statTotal').innerText = counts.total;
            document.getElementById('statInStock').innerText = counts.stock;
            document.getElementById('statUsed').innerText = counts.used;
            document.getElementById('selectAll').checked = (selectedIndices.size === simRecords.length && simRecords.length > 0);
        }

        function toggleSelectAll() { const isChecked = document.getElementById('selectAll').checked; selectedIndices.clear(); if (isChecked) simRecords.forEach((_, i) => selectedIndices.add(i)); render(); }
        function openBatchEdit() { document.getElementById('batchCountText').innerText = selectedIndices.size; document.getElementById('batchEditModal').style.display = 'flex'; }
        
        function confirmBatchSave() {
            const r = document.getElementById('batchRemains').value.trim(); const l = document.getElementById('batchLoc').value.trim(); const s = document.getElementById('batchStaff').value;
            selectedIndices.forEach(idx => { if (r) simRecords[idx].remains = r; if (l) simRecords[idx].location = l; if (s !== "") { simRecords[idx].staff = s; simRecords[idx].usage = (s === "---") ? "在庫" : "已領用"; } updateTime(idx); });
            setDirty(true); closeModal('batchEditModal'); render();
        }

        function batchReset() { if (confirm(`重設選中的 ${selectedIndices.size} 項紀錄？\n(保留電訊商及到期日)`)) { selectedIndices.forEach(idx => { simRecords[idx].remains = "---"; simRecords[idx].location = "---"; simRecords[idx].staff = "---"; simRecords[idx].date = "---"; simRecords[idx].usage = "在庫"; }); selectedIndices.clear(); setDirty(true); render(); } }
        
        function resetAllRecords() { if (confirm("⚠️ 注意：這會重設所有卡片的領取紀錄（保留電訊商及到期日）。確定嗎？")) { simRecords.forEach(r => { r.remains = "---"; r.location = "---"; r.staff = "---"; r.date = "---"; r.usage = "在庫"; }); setDirty(true); render(); } }
        
        function quickEditExpiry(idx) { const val = prompt(`修改到期日 (YYYY/MM/DD):`, simRecords[idx].expiry === "---" ? "" : simRecords[idx].expiry); if (val !== null) { simRecords[idx].expiry = val.trim() || "---"; updateTime(idx); setDirty(true); render(); } }
        function openEditModal(idx) { currentIdx = idx; const r = simRecords[idx]; document.getElementById('modalTitle').innerText = "編輯 " + r.id; document.getElementById('inputUsageVal').value = r.remains === "---" ? "" : r.remains; document.getElementById('inputLoc').value = r.location === "---" ? "" : r.location; document.getElementById('selectStaff').value = r.staff; document.getElementById('editModal').style.display = 'flex'; }
        function confirmSave() { const r = simRecords[currentIdx]; r.remains = document.getElementById('inputUsageVal').value.trim() || "---"; r.location = document.getElementById('inputLoc').value.trim() || "---"; r.staff = document.getElementById('selectStaff').value; r.usage = (r.staff === "---") ? "在庫" : "已領用"; updateTime(currentIdx); setDirty(true); render(); closeModal('editModal'); }
        function resetSingle(idx) { if (confirm(`清除領取紀錄？`)) { simRecords[idx].remains = "---"; simRecords[idx].location = "---"; simRecords[idx].staff = "---"; simRecords[idx].date = "---"; simRecords[idx].usage = "在庫"; setDirty(true); render(); } }
        function updateTime(idx) { const now = new Date(); simRecords[idx].date = now.toLocaleString('zh-HK', { timeZone: 'Asia/Hong_Kong', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }); }
        function generateInitial() { return Array.from({length:totalSIMs}, (_,i)=>({id:"M"+(i+1).toString().padStart(2,'0'), telco:"---", remains:"---", expiry:"---", location:"---", usage:"在庫", staff:"---", date:"---"})); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        
        function exportToExcel() {
            let csv = "\uFEFF編號,狀態,電訊商,用量,到期日,地點,人員,更新時間\n";
            simRecords.forEach(r => csv += `${r.id},${r.staff==='---'?'在庫':'已領用'},${r.telco},${r.remains},${r.expiry},${r.location},${r.staff},${r.date}\n`);
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `SIM_Inventory_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }
    </script>
</body>
</html>
