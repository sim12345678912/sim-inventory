<!DOCTYPE html>
<html lang="zh-Hant">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>SIM 管理系統 V4.9 - 完整功能版</title>
   <style>
       /* --- 核心 UI 樣式 --- */
       body { font-family: "Microsoft JhengHei", system-ui, sans-serif; background-color: #f1f5f9; padding: 20px; color: #334155; margin: 0; }
       .container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
       
       /* 數據卡片 */
       .dashboard { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
       .stat-card { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; flex: 1; text-align: center; min-width: 150px; }
       .stat-card .label { font-size: 28px; color: #64748b; font-weight: bold; }
       .stat-card .value { font-size: 40px; font-weight: 900; color: #1e293b; }
       
       .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
       h1 { margin: 0; font-size: 40px; }
       h1 span { color: #3b82f6; }
       
       /* 按鈕樣式 */
       .btn { padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; font-size: 16px; display: inline-flex; align-items: center; gap: 5px; transition: 0.3s; }
       .btn-sync { background: #10b981; color: white; }
       .btn-sync.dirty { animation: pulse 1.5s infinite; box-shadow: 0 0 15px rgba(16,185,129,0.5); }
       @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

       /* 工具列 */
       .tool-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 15px; }
       .search-box { flex: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 20px; outline: none; }
       
       /* 主表格 */
       table { width: 100%; border-collapse: collapse; }
       th { background: #1e293b; color: #94a3b8; padding: 15px; text-align: left; font-size: 24px; }
       td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 20px; }
       tr:hover { background-color: #f8fafc; }
       .badge { padding: 6px 10px; border-radius: 8px; font-weight: bold; font-size: 18px; }
       .badge-stock { background: #dcfce7; color: #166534; }
       .badge-used { background: #dbeafe; color: #1e40af; }

       /* ✕ 掣樣式 (擺喺修改隔離) */
       .btn-mini-reset { width: 35px; height: 35px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; color: #94a3b8; cursor: pointer; font-size: 18px; transition: 0.2s; }
       .btn-mini-reset:hover { background: #fee2e2; color: #ef4444; border-color: #fecaca; }
       .btn-edit { background: #334155; color: white; padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-size: 18px; }

       /* 紀錄彈窗 UI (復刻版) */
       .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 9000; align-items: center; justify-content: center; }
       .log-window { background: white; width: 90%; max-width: 900px; border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); }
       .log-table-container { border: 1px solid #e2e8f0; border-radius: 12px; overflow-y: auto; max-height: 450px; }
       .inner-log-table { width: 100%; border-collapse: collapse; }
       .inner-log-table th { background: #2d3748; color: white; padding: 12px 20px; position: sticky; top: 0; text-align: left; }
       .inner-log-table td { padding: 15px 20px; border-bottom: 1px solid #edf2f7; font-size: 15px; color: #4a5568; }
       .btn-close-log { width: 100%; background: #f1f5f9; padding: 18px; border-radius: 12px; margin-top: 20px; font-weight: bold; border: none; cursor: pointer; text-align: left; padding-left: 20px; font-size: 18px; }

       /* 編輯彈窗 */
       .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 8000; }
       .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
       input, select { width: 100%; padding: 15px; border: 2px solid #f1f5f9; border-radius: 12px; margin-bottom: 15px; font-size: 20px; box-sizing: border-box; }

       #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
   </style>
</head>
<body>

   <div id="loader">⚙️ 正在通訊中...</div>

   <div class="container">
       <div class="dashboard">
           <div class="stat-card"><div class="label">總卡片</div><div id="statTotal">0</div></div>
           <div class="stat-card"><div class="label">在庫</div><div id="statInStock" style="color:#10b981">0</div></div>
           <div class="stat-card"><div class="label">已領用</div><div id="statUsed" style="color:#3b82f6">0</div></div>
       </div>

       <div class="header-box">
           <h1>SIM <span>管理系統 V4.9</span></h1>
           <div style="display: flex; gap: 10px;">
                <button onclick="showHistoryLog()" class="btn" style="background:#475569;color:white;">📜 操作紀錄</button>
                <button onclick="uploadData()" id="syncBtn" class="btn btn-sync">🫵 💾 儲存同步</button>
           </div>
       </div>

       <div class="tool-bar">
           <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋 ID、人員、地點..." oninput="render()">
           <div id="batchTools" style="display:none; gap:10px;">
                <button onclick="confirmBatchReset()" class="btn" style="background:#2563eb; color:white;">🎁 批量還原 (<span id="selectCount">0</span>)</button>
           </div>
       </div>

       <table>
           <thead>
               <tr>
                   <th style="width:50px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                   <th>編號</th><th>狀態</th><th>電訊商</th><th>可用量</th><th>地點</th><th>領取人</th><th style="text-align:center">操作</th>
               </tr>
           </thead>
           <tbody id="simTable"></tbody>
       </table>
   </div>

   <div id="logOverlay" class="modal-overlay">
       <div class="log-window">
           <div style="font-size:32px; font-weight:bold; margin-bottom:20px;">系統操作紀錄 (最新 1000 條)</div>
           <div class="log-table-container">
               <table class="inner-log-table">
                   <thead><tr><th>時間</th><th>詳細內容</th></tr></thead>
                   <tbody id="logContentBody"></tbody>
               </table>
           </div>
           <button class="btn-close-log" onclick="closeModal('logOverlay')">⬅️ 返回</button>
       </div>
   </div>

   <div id="editModal" class="modal"><div class="modal-content"><h3>修改資料</h3><input type="text" id="editUsage" placeholder="可用量"><input type="text" id="editLoc" placeholder="地點"><select id="editStaff"></select><div style="display:flex;gap:10px;"><button onclick="closeModal('editModal')" class="btn">取消</button><button onclick="saveSingle()" class="btn" style="background:#2563eb;color:white;">確認</button></div></div></div>

   <script>
       const GAS_URL = "你的_GAS_網址"; 
       const userList = ["Leo", "Mason", "Mayce", "Sherman", "ting ting", "Jenna", "Roy", "Arron", "solar", "Willam", "hanson"];
       let simRecords = []; let selectedIndices = new Set(); let currentEditIdx = null;

       // 初始化人員選單
       window.onload = () => {
           const sel = document.getElementById('editStaff');
           sel.add(new Option("-- 在庫 --", "---"));
           userList.forEach(u => sel.add(new Option(u, u)));
           loadData();
       };

       // 【核心】✕ 掣功能：單獨還原該行
       function resetRow(idx) {
           if(!confirm(`確定要還原 [${simRecords[idx].id}] 嗎？`)) return;
           simRecords[idx].usage = "在庫";
           simRecords[idx].staff = "---";
           simRecords[idx].location = "---";
           simRecords[idx].action = "單獨還原(✕掣)";
           updateTime(idx); setDirty(true); render();
       }

       // --- 渲染表格 ---
       function render() {
           const tbody = document.getElementById('simTable');
           const kw = document.getElementById('searchInput').value.toLowerCase();
           let counts = { total: simRecords.length, stock: 0, used: 0 };

           tbody.innerHTML = simRecords.map((r, i) => {
               if (!(r.id.toString().toLowerCase().includes(kw) || r.staff.toLowerCase().includes(kw) || r.location.toLowerCase().includes(kw))) return "";
               const isUsed = r.staff !== "---";
               isUsed ? counts.used++ : counts.stock++;
               
               return `<tr class="${selectedIndices.has(i) ? 'selected' : ''}">
                   <td><input type="checkbox" ${selectedIndices.has(i) ? 'checked' : ''} onchange="toggleRow(${i})"></td>
                   <td><b>${r.id}</b></td>
                   <td><span class="badge ${isUsed ? 'badge-used' : 'badge-stock'}">${isUsed ? '已領用' : '在庫'}</span></td>
                   <td>${r.telco}</td><td>${r.remains}</td><td>${r.location}</td>
                   <td style="color:#2563eb; font-weight:bold;">${r.staff}</td>
                   <td style="text-align:center; display:flex; gap:5px; justify-content:center;">
                       <button class="btn-edit" onclick="openEdit(${i})">修改</button>
                       <button class="btn-mini-reset" onclick="resetRow(${i})" title="直接還原為在庫">✕</button>
                   </td>
               </tr>`;
           }).join('');

           document.getElementById('statTotal').innerText = counts.total;
           document.getElementById('statInStock').innerText = counts.stock;
           document.getElementById('statUsed').innerText = counts.used;
           document.getElementById('batchTools').style.display = selectedIndices.size > 0 ? 'flex' : 'none';
           document.getElementById('selectCount').innerText = selectedIndices.size;
       }

       // --- 基礎功能函數 ---
       function openEdit(idx) { currentEditIdx = idx; const r = simRecords[idx]; document.getElementById('editUsage').value = r.remains; document.getElementById('editLoc').value = r.location; document.getElementById('editStaff').value = r.staff; document.getElementById('editModal').style.display='flex'; }
       function saveSingle() { const r = simRecords[currentEditIdx]; r.remains = document.getElementById('editUsage').value; r.location = document.getElementById('editLoc').value; r.staff = document.getElementById('editStaff').value; r.action = "手動修改資料"; updateTime(currentEditIdx); setDirty(true); closeModal('editModal'); render(); }
       function confirmBatchReset() { selectedIndices.forEach(idx => { simRecords[idx].usage="在庫"; simRecords[idx].staff="---"; simRecords[idx].location="---"; simRecords[idx].action="批量還原"; updateTime(idx); }); setDirty(true); selectedIndices.clear(); render(); }
       async function showHistoryLog() { toggleLoader(true); const res = await fetch(GAS_URL + "?type=getLogs&t="+Date.now()); const logs = await res.json(); document.getElementById('logContentBody').innerHTML = logs.map(l => `<tr><td>${l.time}</td><td>[${l.id}] ${l.action}</td></tr>`).join(''); document.getElementById('logOverlay').style.display='flex'; toggleLoader(false); }
       function updateTime(idx) { simRecords[idx].date = new Date().toLocaleString('zh-HK',{hour12:false}); }
       function setDirty(d) { document.getElementById('syncBtn').classList.toggle('dirty', d); }
       function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
       function closeModal(id) { document.getElementById(id).style.display = 'none'; }
       function toggleRow(i) { selectedIndices.has(i) ? selectedIndices.delete(i) : selectedIndices.add(i); render(); }
       function toggleSelectAll() { const chk = document.getElementById('selectAll').checked; selectedIndices.clear(); if(chk) simRecords.forEach((_,i)=>selectedIndices.add(i)); render(); }
       async function loadData() { toggleLoader(true); const res = await fetch(GAS_URL + "?t=" + Date.now()); simRecords = await res.json(); render(); toggleLoader(false); }
       async function uploadData() { toggleLoader(true); await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(simRecords) }); setDirty(false); setTimeout(loadData, 1000); }
   </script>
</body>
</html>
