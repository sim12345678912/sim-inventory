<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM 雲端管理系統 - 批量挑選優化版</title>
    <style>
        body { font-family: sans-serif; background-color: #f1f5f9; padding: 20px; color: #334155; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .header-box { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        h1 { color: #1e293b; margin: 0; font-size: 28px; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; }

        /* 數據看板 */
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #f8fafc; padding: 10px 20px; border-radius: 12px; border: 1px solid #e2e8f0; flex: 1; text-align: center; }
        .stat-card .label { font-size: 12px; color: #64748b; font-weight: bold; }
        .stat-card .value { font-size: 20px; font-weight: 900; color: #1e293b; }

        /* 搜尋與批量工具 */
        .tool-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .search-box { flex: 1; max-width: 300px; padding: 10px 15px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: #3b82f6; background: #f0f7ff; }

        /* 按鈕樣式 */
        .btn { padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
        .btn-refresh { background: #e2e8f0; color: #475569; }
        .btn-sync { background: #f59e0b; color: white; }
        .btn-sync.dirty { background: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        
        .btn-batch { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }
        .btn-batch:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }
        .btn-reset-all { background: #fee2e2; color: #dc2626; }

        .btn-edit { background: #334155; color: white; padding: 6px 12px; font-size: 12px; }
        .btn-reset-single { background: none; color: #cbd5e1; font-size: 18px; border:none; cursor:pointer; }
        .btn-reset-single:hover { color: #ef4444; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #1e293b; color: white; padding: 14px; text-align: left; }
        td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
        tr.selected { background-color: #eff6ff; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 900; }
        .badge-stock { background: #dcfce7; color: #166534; }
        .badge-used { background: #dbeafe; color: #1e40af; }
        
        .expiry-safe { color: #64748b; }
        .expiry-warning { color: #f59e0b; font-weight: bold; }
        .expiry-danger { color: #ef4444; font-weight: bold; text-decoration: underline; }

        .quick-edit-btn { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; margin-left: 8px; background: #f1f5f9; border-radius: 6px; cursor: pointer; color: #94a3b8; font-size: 10px; border: 1px solid #e2e8f0; }
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); color: white; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        input, select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; box-sizing: border-box; font-weight: bold; outline: none; margin-top: 5px; margin-bottom: 15px; }
        .telco-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .telco-btn { padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; background: #fff; cursor: pointer; font-weight: bold; text-align: center; }
        .telco-btn:hover { border-color: #3b82f6; background: #eff6ff; }

        /* 勾選框樣式 */
        .checkbox-cell { text-align: center; width: 40px; }
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">雲端同步中...</div>

    <div class="container">
        <!-- 數據看板 -->
        <div class="dashboard">
            <div class="stat-card"><div class="label">總卡片數</div><div id="statTotal" class="value">0</div></div>
            <div class="stat-card"><div class="label">在庫數</div><div id="statInStock" class="value" style="color:#10b981">0</div></div>
            <div class="stat-card"><div class="label">已領用</div><div id="statUsed" class="value" style="color:#3b82f6">0</div></div>
            <div class="stat-card"><div class="label">即將到期</div><div id="statWarning" class="value" style="color:#f59e0b">0</div></div>
        </div>

        <div class="header-box">
            <div style="flex:1">
                <h1>SIM <span style="color:#3b82f6">Cloud</span></h1>
            </div>
            <div class="button-group">
                <button onclick="loadData()" class="btn btn-refresh">🔄 刷新</button>
                <button onclick="uploadData()" id="syncBtn" class="btn btn-sync">💾 儲存並同步</button>
                <button onclick="resetAllRecords()" class="btn btn-reset-all">⚠️ 全部重設紀錄</button>
            </div>
        </div>

        <div class="tool-bar">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜尋編號、電訊商、人員..." oninput="render()">
            <button onclick="batchReset()" id="batchBtn" class="btn btn-batch" style="display:none;">🧹 重設選中項目 (<span id="selectCount">0</span>)</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th class="checkbox-cell"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                    <th style="text-align:center; width: 60px;">編號</th>
                    <th>狀態</th>
                    <th>電訊商</th>
                    <th>剩餘用量</th>
                    <th>到期日</th>
                    <th>地點</th>
                    <th>提取人員</th>
                    <th style="text-align:center">最後更新</th>
                    <th style="text-align:center">操作</th>
                </tr>
            </thead>
            <tbody id="simTable"></tbody>
        </table>
    </div>

    <!-- 彈窗內容 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0;">編輯領取資訊</h2>
            <label style="font-size:11px; font-weight:bold; color:#94a3b8;">剩餘用量</label><input type="text" id="inputUsageVal">
            <label style="font-size:11px; font-weight:bold; color:#94a3b8;">存放地點</label><input type="text" id="inputLoc">
            <label style="font-size:11px; font-weight:bold; color:#94a3b8;">提取人員</label><select id="selectStaff" style="background:#eff6ff; color:#1d4ed8;"></select>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="closeModal('editModal')" class="btn" style="flex:1; background:#f1f5f9; color:#64748b;">取消</button>
                <button onclick="confirmSave()" class="btn" style="flex:1; background:#2563eb; color:white;">本地確認</button>
            </div>
        </div>
    </div>

    <div id="telcoModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">選擇電訊商</h2>
            <div class="telco-grid" id="telcoBtnGroup"></div>
            <button onclick="closeModal('telcoModal')" class="btn" style="width:100%; margin-top:20px; background:#f1f5f9; color:#64748b;">關閉</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://google.com"; 

        const userList = ["Leo", "Mason", "Mayce", "Sherman", "ting ting", "Jenna", "Roy", "Arron", "solar", "Willam", "hanson"];
        const telcoList = ["CSL", "3HK", "SmarTone", "CMHK", "Lucky SIM"];
        let simRecords = [];
        let selectedIndices = new Set();
        let currentIdx = null;
        let isDirty = false; 

        window.onload = function() {
            const staffSelect = document.getElementById('selectStaff');
            staffSelect.options.add(new Option("-- 未領取 --", "---"));
            userList.forEach(n => staffSelect.options.add(new Option(n, n)));
            const btnGroup = document.getElementById('telcoBtnGroup');
            telcoList.forEach(t => {
                let btn = document.createElement('div'); btn.className = 'telco-btn'; btn.innerText = t;
                btn.onclick = () => selectTelco(t); btnGroup.appendChild(btn);
            });
            let otherBtn = document.createElement('div'); otherBtn.className = 'telco-btn'; otherBtn.innerText = '➕ 其他';
            otherBtn.style.color = '#3b82f6';
            otherBtn.onclick = () => { let c = prompt("輸入電訊商:"); if(c) selectTelco(c); }; btnGroup.appendChild(otherBtn);
            loadData();
        };

        async function loadData() {
            if(isDirty && !confirm("尚未儲存，確定刷新？")) return;
            toggleLoader(true);
            try {
                const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
                const data = await res.json();
                simRecords = (Array.isArray(data) && data.length > 0) ? data : generateInitial();
                setDirty(false);
                selectedIndices.clear();
                render();
            } catch(e) { simRecords = generateInitial(); render(); }
            toggleLoader(false);
        }

        async function uploadData() {
            toggleLoader(true);
            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(simRecords) });
                setTimeout(() => { setDirty(false); loadData(); alert("同步成功！"); }, 1200);
            } catch(e) { alert("同步失敗"); toggleLoader(false); }
        }

        function setDirty(dirty) {
            isDirty = dirty;
            document.getElementById('syncBtn').classList.toggle('dirty', dirty);
        }

        // --- 核心邏輯優化 ---

        function toggleSelectAll() {
            const master = document.getElementById('selectAll');
            selectedIndices.clear();
            if (master.checked) {
                simRecords.forEach((_, i) => selectedIndices.add(i));
            }
            render();
        }

        function toggleItem(idx) {
            if (selectedIndices.has(idx)) selectedIndices.delete(idx);
            else selectedIndices.add(idx);
            render();
        }

        // 修改後的重設所有功能：僅清除動態資訊
        function resetAllRecords() {
            if (confirm("⚠️ 確定要重設【所有卡片】的領取紀錄嗎？\n(電訊商及到期日將會保留)")) {
                simRecords.forEach(r => {
                    r.remains = "---"; r.location = "---"; r.staff = "---"; r.date = "---"; r.usage = "在庫";
                });
                setDirty(true); render();
            }
        }

        // 批量重設選中的項目
        function batchReset() {
            if (selectedIndices.size === 0) return;
            if (confirm(`確定要重設這 ${selectedIndices.size} 個項目的領取紀錄嗎？`)) {
                selectedIndices.forEach(idx => {
                    simRecords[idx].remains = "---";
                    simRecords[idx].location = "---";
                    simRecords[idx].staff = "---";
                    simRecords[idx].date = "---";
                    simRecords[idx].usage = "在庫";
                });
                selectedIndices.clear();
                setDirty(true); render();
            }
        }

        function render() {
            const tbody = document.getElementById('simTable');
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const now = new Date();
            let counts = { total: simRecords.length, stock: 0, used: 0, warning: 0 };

            tbody.innerHTML = simRecords.map((r, i) => {
                const isMatch = r.id.toLowerCase().includes(keyword) || r.telco.toLowerCase().includes(keyword) || r.staff.toLowerCase().includes(keyword);
                if (!isMatch) return "";

                const isUsed = r.staff !== "---";
                if(isUsed) counts.used++; else counts.stock++;
                
                let expiryClass = "expiry-safe";
                if (r.expiry !== "---" && r.expiry.includes("/")) {
                    const expDate = new Date(r.expiry);
                    const diffDays = (expDate - now) / (1000 * 60 * 60 * 24);
                    if (diffDays < 0) expiryClass = "expiry-danger";
                    else if (diffDays <= 30) { expiryClass = "expiry-warning"; counts.warning++; }
                }

                const isChecked = selectedIndices.has(i);

                return `
                <tr class="${isChecked ? 'selected' : ''}">
                    <td class="checkbox-cell"><input type="checkbox" ${isChecked ? 'checked' : ''} onclick="toggleItem(${i})"></td>
                    <td style="text-align:center; font-weight:bold; color:#cbd5e1;">${r.id}</td>
                    <td><span class="badge ${isUsed ? 'badge-used' : 'badge-stock'}">${isUsed ? '已領用' : '在庫'}</span></td>
                    <td><div style="display:flex; align-items:center;"><span style="font-weight:bold;">${r.telco}</span><div class="quick-edit-btn" onclick="openTelcoModal(${i})">✏️</div></div></td>
                    <td><span style="background:#f1f5f9; padding:3px 8px; border-radius:6px; font-size:12px; font-weight:bold;">${r.remains}</span></td>
                    <td><div style="display:flex; align-items:center;"><span class="${expiryClass}">${r.expiry}</span><div class="quick-edit-btn" onclick="quickEditExpiry(${i})">✏️</div></div></td>
                    <td style="color:#64748b;">${r.location}</td>
                    <td style="color:#2563eb; font-weight:bold;">${r.staff}</td>
                    <td style="text-align:center; color:#cbd5e1; font-size:11px;">${String(r.date).replace(/'/g, "") || "---"}</td>
                    <td style="text-align:center;"><div style="display:flex; align-items:center; justify-content:center;"><button onclick="openEditModal(${i})" class="btn btn-edit">修改</button><button onclick="resetSingle(${i})" class="btn btn-reset-single">✕</button></div></td>
                </tr>`;
            }).join('');

            // 更新按鈕與看板
            document.getElementById('batchBtn').style.display = selectedIndices.size > 0 ? 'inline-flex' : 'none';
            document.getElementById('selectCount').innerText = selectedIndices.size;
            document.getElementById('statTotal').innerText = counts.total;
            document.getElementById('statInStock').innerText = counts.stock;
            document.getElementById('statUsed').innerText = counts.used;
            document.getElementById('statWarning').innerText = counts.warning;
            document.getElementById('selectAll').checked = selectedIndices.size === simRecords.length && simRecords.length > 0;
        }

        // --- 基礎函數保持不變 ---
        function openTelcoModal(idx) { currentIdx = idx; document.getElementById('telcoModal').style.display = 'flex'; }
        function selectTelco(val) { simRecords[currentIdx].telco = val; updateTime(currentIdx); setDirty(true); render(); closeModal('telcoModal'); }
        function quickEditExpiry(idx) { 
            const val = prompt(`輸入 ${simRecords[idx].id} 到期日:`, simRecords[idx].expiry === "---" ? "" : simRecords[idx].expiry);
            if (val !== null) { simRecords[idx].expiry = val.trim() || "---"; updateTime(idx); setDirty(true); render(); }
        }
        function openEditModal(idx) {
            currentIdx = idx; const r = simRecords[idx];
            document.getElementById('modalTitle').innerText = "編輯 " + r.id;
            document.getElementById('inputUsageVal').value = r.remains === "---" ? "" : r.remains;
            document.getElementById('inputLoc').value = r.location === "---" ? "" : r.location;
            document.getElementById('selectStaff').value = r.staff;
            document.getElementById('editModal').style.display = 'flex';
        }
        function confirmSave() {
            const r = simRecords[currentIdx];
            r.remains = document.getElementById('inputUsageVal').value.trim() || "---";
            r.location = document.getElementById('inputLoc').value.trim() || "---";
            r.staff = document.getElementById('selectStaff').value;
            r.usage = r.staff === "---" ? "在庫" : "已領用";
            updateTime(currentIdx); setDirty(true); render(); closeModal('editModal');
        }
        function resetSingle(idx) {
            if (confirm(`清除領取紀錄？`)) {
                simRecords[idx].remains = "---"; simRecords[idx].location = "---"; simRecords[idx].staff = "---"; simRecords[idx].date = "---";
                simRecords[idx].usage = "在庫"; setDirty(true); render();
            }
        }
        function updateTime(idx) { 
            const now = new Date();
            simRecords[idx].date = now.toLocaleString('zh-HK', { timeZone: 'Asia/Hong_Kong', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
        }
        function generateInitial() { return Array.from({length:30}, (_,i)=>({id:"M"+(i+1).toString().padStart(2,'0'), telco:"---", remains:"---", expiry:"---", location:"---", usage:"在庫", staff:"---", date:"---"})); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    </script>
</body>
</html>
