<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM 雲端同步系統</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; color: white; font-weight: bold; }
        body.is-loading .loading-overlay { display: flex; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div id="loader" class="loading-overlay flex-col">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-2"></div>
        <p>雲端同步中...</p>
    </div>

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-800">SIM <span class="text-blue-600">Cloud Sync</span></h1>
            <div class="flex gap-2">
                <button onclick="loadData()" class="bg-slate-100 px-4 py-2 rounded-lg font-bold text-sm">🔄 刷新</button>
                <button onclick="resetAll()" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-lg font-bold text-sm">⚠️ 重置</button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="bg-slate-900 text-white">
                        <th class="p-4 text-center">編號</th>
                        <th class="p-4 text-left">電訊商</th>
                        <th class="p-4 text-left">用量</th>
                        <th class="p-4 text-left">地點</th>
                        <th class="p-4 text-left">領取人</th>
                        <th class="p-4 text-center">更新日期</th>
                        <th class="p-4 text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="simTable" class="divide-y divide-slate-100">
                    <tr><td colspan="7" class="p-10 text-center text-slate-400">正在讀取雲端資料...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 修改彈窗 -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 id="modalTitle" class="text-xl font-black mb-4">修改</h2>
            <div class="space-y-4">
                <select id="selectTelco" class="w-full border p-3 rounded-xl bg-slate-50 font-bold"></select>
                <input type="text" id="inputUsageVal" placeholder="用量" class="w-full border p-3 rounded-xl">
                <input type="text" id="inputLoc" placeholder="地點" class="w-full border p-3 rounded-xl">
                <select id="selectStaff" class="w-full border p-3 rounded-xl bg-blue-50 text-blue-700 font-bold"></select>
            </div>
            <div class="flex mt-6 gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 text-slate-400 font-bold">取消</button>
                <button onclick="confirmSave()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg">確認儲存</button>
            </div>
        </div>
    </div>

    <script>
        // ★ 在這裡貼上你的 GAS 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx_nEKm4Bi7bf4xiVtmtNGfTM56Ss-TcjKrDMAyvCun7AG5E-GtgvJCTKZSsFrtCnyi/exec"; 

        const userList = ["Leo", "Mason", "Mayce", "Sherman", "ting ting", "Jenna", "Roy", "Arron", "solar", "Willam", "hanson"];
        const telcoList = ["CSL", "3HK", "SmarTone", "CMHK", "Lucky SIM"];
        let simRecords = [];
        let currentEditIdx = null;

        window.onload = () => {
            userList.forEach(n => document.getElementById('selectStaff').add(new Option(n, n)));
            telcoList.forEach(t => document.getElementById('selectTelco').add(new Option(t, t)));
            loadData();
        };

        async function loadData() {
            document.body.classList.add('is-loading');
            try {
                const res = await fetch(GAS_URL);
                simRecords = await res.json();
                if(!simRecords || simRecords.length === 0) { simRecords = generateInitial(); }
                render();
            } catch(e) { alert("讀取雲端失敗，請檢查網址"); }
            document.body.classList.remove('is-loading');
        }

        async function confirmSave() {
            const r = simRecords[currentEditIdx];
            r.telco = document.getElementById('selectTelco').value;
            r.remains = document.getElementById('inputUsageVal').value || "---";
            r.location = document.getElementById('inputLoc').value || "---";
            r.staff = document.getElementById('selectStaff').value;
            r.date = new Date().toLocaleString('zh-HK', {hour12:false, month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
            r.usage = "已提取"; // 預設用途

            closeModal();
            render();
            document.body.classList.add('is-loading');
            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(simRecords) });
                setTimeout(loadData, 1500); 
            } catch(e) { alert("儲存失敗"); document.body.classList.remove('is-loading'); }
        }

        function render() {
            document.getElementById('simTable').innerHTML = simRecords.map((r, i) => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 text-center font-mono font-bold text-slate-300 border-r">${r.id}</td>
                    <td class="p-4 font-bold text-slate-700">${r.telco}</td>
                    <td class="p-4"><span class="bg-slate-100 px-2 py-1 rounded text-xs font-bold text-slate-500">${r.remains}</span></td>
                    <td class="p-4">${r.location}</td>
                    <td class="p-4 text-blue-600 font-black">${r.staff}</td>
                    <td class="p-4 text-center text-[10px] text-slate-300 font-mono">${r.date}</td>
                    <td class="p-4 text-center"><button onclick="openModal(${i})" class="bg-slate-800 text-white px-3 py-1 rounded-lg text-xs font-bold">修改</button></td>
                </tr>
            `).join('');
        }

        function openModal(i) {
            currentEditIdx = i;
            const r = simRecords[i];
            document.getElementById('modalTitle').innerText = "編輯 " + r.id;
            document.getElementById('selectTelco').value = r.telco;
            document.getElementById('inputUsageVal').value = r.remains === "---" ? "" : r.remains;
            document.getElementById('inputLoc').value = r.location === "---" ? "" : r.location;
            document.getElementById('selectStaff').value = r.staff;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }
        function generateInitial() { return Array.from({length:30}, (_,i)=>({id:"M"+(i+1).toString().padStart(2,'0'), telco:"---", remains:"---", location:"---", usage:"在庫", staff:"---", date:"---"})); }
        async function resetAll() { if(confirm("確定重置雲端資料？")) { simRecords = generateInitial(); render(); document.body.classList.add('is-loading'); await fetch(GAS_URL, {method:'POST', mode:'no-cors', body:JSON.stringify(simRecords)}); setTimeout(loadData, 1500); } }
    </script>
</body>
</html>
